/* Convert a compass heading in degrees to a 16-point cardinal label */
function headingToCardinal(deg){
  const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return d[Math.round(((deg%360)+360)%360/22.5)%16];
}

/* Reusable compass-assisted orientation field.
   User points phone TOWARD the entrance; we flip +180° to record the outward-facing aspect. */
function CompassField({value,onChange}){
  const t=useTheme();
  const [status,setStatus]=useState('idle'); /* idle | reading | done | denied | unsupported */
  const capture=async()=>{
    if(status==='reading') return;
    if(!window.DeviceOrientationEvent){setStatus('unsupported');return;}
    setStatus('reading');
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      try{const p=await DeviceOrientationEvent.requestPermission();if(p!=='granted'){setStatus('denied');return;}}
      catch{setStatus('denied');return;}
    }
    const readings=[];
    const handler=e=>{
      const h=e.webkitCompassHeading!=null?e.webkitCompassHeading
              :(e.absolute&&e.alpha!=null?(360-e.alpha+360)%360:null);
      if(h==null) return;
      readings.push(h);
      if(readings.length>=6){
        window.removeEventListener('deviceorientationabsolute',handler);
        window.removeEventListener('deviceorientation',handler);
        const aspect=((readings.reduce((a,b)=>a+b,0)/readings.length)+180)%360;
        onChange(`${headingToCardinal(aspect)} (${Math.round(aspect)}°)`);
        setStatus('done');
      }
    };
    window.addEventListener('deviceorientationabsolute',handler);
    window.addEventListener('deviceorientation',handler);
    setTimeout(()=>{
      window.removeEventListener('deviceorientationabsolute',handler);
      window.removeEventListener('deviceorientation',handler);
      if(readings.length>0){
        const aspect=((readings.reduce((a,b)=>a+b,0)/readings.length)+180)%360;
        onChange(`${headingToCardinal(aspect)} (${Math.round(aspect)}°)`);
        setStatus('done');
      } else setStatus('unsupported');
    },5000);
  };
  const btnLabel={idle:'Detect',reading:'…',done:'Re-detect',denied:'Denied',unsupported:'N/A'}[status];
  const hint={
    idle:"Tap Detect, then point your phone toward the entrance. The bearing recorded will be the direction it faces outward.",
    reading:'Point your phone toward the entrance — the app records the outward-facing direction automatically.',
    done:'Captured. Tap Re-detect to update.',
    denied:'Permission denied — enter orientation manually.',
    unsupported:'Compass not available on this device — enter manually.',
  }[status];
  return <>
    <div style={{display:'flex',gap:8,alignItems:'center'}}>
      <div style={{flex:1}}><FInput value={value} onChange={onChange} placeholder="e.g. NE (48°)"/></div>
      <button onClick={capture} disabled={status==='reading'} style={{flexShrink:0,padding:'10px 14px',borderRadius:12,background:status==='done'?t.sage50:t.f700,color:status==='done'?t.f700:'#fff',border:'none',fontSize:12.5,fontWeight:600,cursor:'pointer',opacity:status==='reading'?0.6:1}}>
        {status==='reading'
          ? <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:10,borderRadius:'50%',border:'2px solid currentColor',borderTopColor:'transparent',display:'inline-block',animation:'spin 0.8s linear infinite'}}/>…</span>
          : btnLabel}
      </button>
    </div>
    <div style={{fontSize:11.5,color:t.mid,marginTop:5,lineHeight:1.4}}>{hint}</div>
  </>;
}

function AddWombatModal({burrows=[],onClose,onSave,initialLocation=null,nextCode=''}){
  const t=useTheme();
  const [form,setForm]=useState({name:nextCode,sex:'unknown',ageClass:'adult',status:'',firstSeen:today(),notes:''});
  const [location,setLocation]=useState(initialLocation);
  const [linkedBurrow,setLinkedBurrow]=useState(null);
  const [showMapPicker,setShowMapPicker]=useState(false);
  const [showGeoSearch,setShowGeoSearch]=useState(false);
  const [burrowSearch,setBurrowSearch]=useState('');
  const [showBurrowSearch,setShowBurrowSearch]=useState(false);
  const [photoDataUrl,setPhotoDataUrl]=useState(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const useCurrentLocation=()=>{
    if(!navigator.geolocation)return alert('Geolocation is not available on this device.');
    navigator.geolocation.getCurrentPosition(
      async pos=>{
        const lat=pos.coords.latitude,lng=pos.coords.longitude;
        setLocation({lat,lng});
        const locality=await reverseGeocode(lat,lng);
        if(locality)setLocation({lat,lng,address:locality});
      },
      ()=>alert('Could not get your location. Please check permissions.')
    );
  };
  const filteredBurrows=burrows.filter(b=>b.name.toLowerCase().includes(burrowSearch.toLowerCase()));
  return <ModalWrap title="New Wombat" subtitle="Register a newly identified wombat" onClose={onClose} saveLabel="Save Wombat" onSave={()=>{
    if(!form.name.trim())return alert('Please enter a name.');
    if(!form.firstSeen)return alert('Please enter the first seen date.');
    if(!form.status)return alert('Please select a health status.');
    if(!linkedBurrow&&!location)return alert('Please add a location.');
    const lat=linkedBurrow?linkedBurrow.lat:location?.lat??null;
    const lng=linkedBurrow?linkedBurrow.lng:location?.lng??null;
    const locationStr=linkedBurrow?linkedBurrow.location:(location?.locality||location?.address||null);
    const wId=uid();
    const photo=photoDataUrl?{id:'ph_'+Date.now(),wombatId:wId,dataUrl:photoDataUrl,isProfile:true,at:new Date().toISOString()}:null;
    onSave({id:wId,code:nextCode,...form,severity:{},lat,lng,location:locationStr,burrowIds:linkedBurrow?[linkedBurrow.id]:[],_sync:true},linkedBurrow?.id||null,photo);
  }}>
    <FormField label="Name" required><FInput value={form.name} onChange={v=>set('name',v)} placeholder="e.g. Walter"/></FormField>
    <FormField label="Sex">

      ()=>alert('Could not get your location. Please check permissions.')

/* ════════════════════════════════════════════════════════════════
   REDUCER
   Pure function — all state mutations go through here.
   Each case saves the affected slice to localStorage via save().
   Bidirectional wombat↔burrow links are kept in sync by
   LINK_WOMBAT_BURROW; always use that action when associating them.
   ADD_BURROW_LOG also updates burrow.status and burrow.lastChecked
   as a side-effect.
════════════════════════════════════════════════════════════════ */
function reducer(state,action){
  switch(action.type){
    case 'ADD_WOMBAT':{const wombats=[...state.wombats,action.wombat];save('w',wombats);return{...state,wombats};}
    case 'UPDATE_WOMBAT':{const wombats=state.wombats.map(w=>w.id===action.id?{...w,...action.patch}:w);save('w',wombats);return{...state,wombats};}
    case 'IMPORT_WOMBATS':{const wombats=[...state.wombats,...action.wombats];save('w',wombats);return{...state,wombats};}
    case 'DELETE_WOMBAT':{
      // Remove the wombat and all its associated local records
      const wombats=state.wombats.filter(w=>w.id!==action.id);
      const treatments=state.treatments.filter(t=>t.wombatId!==action.id);
      const sightings=state.sightings.filter(s=>s.wombatId!==action.id);
      const wombatPhotos=state.wombatPhotos.filter(p=>p.wombatId!==action.id);
      // Unlink from any burrows that referenced this wombat
      const burrows=state.burrows.map(b=>b.wombatIds?.includes(action.id)?{...b,wombatIds:b.wombatIds.filter(id=>id!==action.id)}:b);
      save('w',wombats);save('t',treatments);save('s',sightings);save('wp',wombatPhotos);save('b',burrows);
      return{...state,wombats,treatments,sightings,wombatPhotos,burrows};
    }
    case 'ADD_BURROW':{const burrows=[...state.burrows,action.burrow];save('b',burrows);return{...state,burrows};}
    case 'IMPORT_BURROWS':{const burrows=[...state.burrows,...action.burrows];save('b',burrows);return{...state,burrows};}
    case 'UPDATE_BURROW':{const burrows=state.burrows.map(b=>b.id===action.id?{...b,...action.patch}:b);save('b',burrows);return{...state,burrows};}
    case 'DELETE_BURROW':{
      // Remove the burrow and all its associated local records
      const burrows=state.burrows.filter(b=>b.id!==action.id);
      const burrowLogs=state.burrowLogs.filter(l=>l.burrowId!==action.id);
      const burrowPhotos=state.burrowPhotos.filter(p=>p.burrowId!==action.id);
      // Unlink from any wombats that referenced this burrow
      const wombats=state.wombats.map(w=>w.burrowIds?.includes(action.id)?{...w,burrowIds:w.burrowIds.filter(id=>id!==action.id)}:w);
      save('b',burrows);save('bl',burrowLogs);save('bp',burrowPhotos);save('w',wombats);
      return{...state,burrows,burrowLogs,burrowPhotos,wombats};
    }
    case 'ADD_TREATMENT':{const treatments=[...state.treatments,action.treatment];save('t',treatments);return{...state,treatments};}
    case 'DELETE_TREATMENT':{const treatments=state.treatments.filter(t=>t.id!==action.treatmentId);save('t',treatments);return{...state,treatments};}
    case 'ADD_SIGHTING':{const sightings=[...state.sightings,action.sighting];save('s',sightings);return{...state,sightings};}
    case 'ADD_WOMBAT_PHOTO':{const wombatPhotos=[...state.wombatPhotos,action.photo];save('wp',wombatPhotos);return{...state,wombatPhotos};}
    case 'SET_PROFILE_PHOTO':{const wombatPhotos=state.wombatPhotos.map(p=>p.wombatId===action.wombatId?{...p,isProfile:p.id===action.photoId}:p);save('wp',wombatPhotos);return{...state,wombatPhotos};}
    case 'DELETE_WOMBAT_PHOTO':{const wombatPhotos=state.wombatPhotos.filter(p=>p.id!==action.photoId);save('wp',wombatPhotos);return{...state,wombatPhotos};}
    case 'ADD_BURROW_PHOTO':{const burrowPhotos=[...state.burrowPhotos,action.photo];save('bp',burrowPhotos);return{...state,burrowPhotos};}
    case 'SET_BURROW_PROFILE_PHOTO':{const burrowPhotos=state.burrowPhotos.map(p=>p.burrowId===action.burrowId?{...p,isProfile:p.id===action.photoId}:p);save('bp',burrowPhotos);return{...state,burrowPhotos};}
    case 'DELETE_BURROW_PHOTO':{const burrowPhotos=state.burrowPhotos.filter(p=>p.id!==action.photoId);save('bp',burrowPhotos);return{...state,burrowPhotos};}
    case 'DELETE_BURROW_LOG':{
      const bl=state.burrowLogs.filter(l=>l.id!==action.logId);
      // revert burrow status/lastChecked to most recent remaining log if any
      const remaining=bl.filter(l=>l.burrowId===action.burrowId).sort((a,b)=>new Date(b.at)-new Date(a.at));
      const burs=state.burrows.map(b=>b.id===action.burrowId?{...b,status:remaining[0]?.status||b.status,lastChecked:remaining[0]?.at||b.lastChecked}:b);
      save('bl',bl);save('b',burs);
      return{...state,burrowLogs:bl,burrows:burs};}
    case 'ADD_BURROW_LOG':{
      const bl=[...state.burrowLogs,action.log];
      // update burrow status + entrance measurements + habitat if provided
      const logPatch={status:action.log.status,lastChecked:action.log.at};
      if(action.log.heightCm!=null&&action.log.heightCm!=='') logPatch.entranceHeightCm=action.log.heightCm;
      if(action.log.widthCm!=null&&action.log.widthCm!=='') logPatch.entranceWidthCm=action.log.widthCm;
      if(action.log.orientation) logPatch.orientation=action.log.orientation;
      const burs=state.burrows.map(b=>{
        if(b.id!==action.log.burrowId) return b;
        const habitatPatch={};
        if(action.log.substrate) habitatPatch.substrate=action.log.substrate;
        if(action.log.vegetation) habitatPatch.vegetation=action.log.vegetation;
        if(action.log.trailCamera!==undefined) habitatPatch.trailCamera=action.log.trailCamera;
        return{...b,...logPatch,habitat:{...b.habitat,...habitatPatch}};
      });
      save('bl',bl);save('b',burs);
      return{...state,burrowLogs:bl,burrows:burs};
    }
    case 'LINK_WOMBAT_BURROW':{
      const{wombatId,burrowId}=action;
      const wombats=state.wombats.map(w=>w.id===wombatId?{...w,burrowIds:[...(w.burrowIds||[]).filter(id=>id!==burrowId),burrowId]}:w);
      const burrows=state.burrows.map(b=>b.id===burrowId?{...b,wombatIds:[...(b.wombatIds||[]).filter(id=>id!==wombatId),wombatId]}:b);
      save('w',wombats);save('b',burrows);
      return{...state,wombats,burrows};
    }
    case 'REPLACE_ALL':{
      const{wombats,burrows,treatments,sightings,burrowLogs,wombatPhotos,burrowPhotos}=action.data;
      save('w',wombats);save('b',burrows);save('t',treatments);
      save('s',sightings);save('bl',burrowLogs);save('wp',wombatPhotos);save('bp',burrowPhotos);
      return{...state,wombats,burrows,treatments,sightings,burrowLogs,wombatPhotos,burrowPhotos};
    }
    default:return state;
  }
}

function ConfirmModal({title,message,confirmLabel='Delete',onConfirm,onCancel}){
  const t=useTheme();
  return(
    <div style={{position:'fixed',inset:0,zIndex:2100,display:'flex',alignItems:'flex-end',justifyContent:'center',background:'rgba(0,0,0,0.45)',padding:'0 0 var(--sab)'}}>
      <div style={{width:'100%',maxWidth:480,background:t.surface,borderRadius:'24px 24px 0 0',padding:'24px 24px calc(24px + var(--sab))',boxShadow:'0 -4px 32px rgba(0,0,0,0.18)'}}>
        {/* Red warning icon */}
        <div style={{width:48,height:48,borderRadius:16,background:t.rose50,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
          {Ico.trash(t.rose700,22)}
        </div>
        <div style={{fontSize:17,fontWeight:800,color:t.ink,textAlign:'center',marginBottom:8}}>{title}</div>
        <div style={{fontSize:14,color:t.mid,textAlign:'center',lineHeight:1.55,marginBottom:24}}>{message}</div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onCancel} style={{flex:1,height:48,borderRadius:14,background:t.soft,color:t.ink,fontSize:15,fontWeight:600,border:'none'}}>Cancel</button>
          <button onClick={onConfirm} style={{flex:1,height:48,borderRadius:14,background:t.rose700,color:'#fff',fontSize:15,fontWeight:700,border:'none'}}>
            {Ico.trash('#fff',14)} {confirmLabel}
          </button>
        </div>
      </div>
    </div>
  );
}

function SignInModal({onClose}){
  const t=useTheme();
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');

  const submit=async e=>{
    e&&e.preventDefault();setErr('');setLoading(true);
    try{
      const{error}=await supa.auth.signInWithPassword({email,password:pw});
      if(error)throw error;
      onClose&&onClose();
    }catch(e){setErr(e.message||'Incorrect email or password.');}
    finally{setLoading(false);}
  };

  const inp={background:t.soft,color:t.ink,borderRadius:12,padding:'13px 14px',fontSize:16,width:'100%',border:`1.5px solid ${t.div}`,marginBottom:10,display:'block'};
  const isWall=!onClose;
  const overlay={position:'fixed',inset:0,zIndex:2000,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:isWall?t.bg:'rgba(0,0,0,0.55)',padding:'0 24px'};
  const card={background:t.surface,borderRadius:24,padding:'28px 20px',width:'100%',maxWidth:380,boxShadow:t.shadow};

  return(
    <div style={overlay}>
      {isWall&&<div style={{marginBottom:32,textAlign:'center'}}>
        {/* App icon — rounded square matching iOS/Android icon style */}
        <div style={{width:84,height:84,borderRadius:22,background:'linear-gradient(135deg,#1F3A2A 0%,#3A6A42 100%)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 18px',boxShadow:'0 4px 24px rgba(31,58,42,0.28)'}}>
          {Ico.wombat('#fff',44)}
        </div>
        <div style={{fontSize:11,letterSpacing:2,textTransform:'uppercase',color:t.f600,fontWeight:700,marginBottom:5}}>WombatWatch</div>
        <div style={{fontSize:14,color:t.mid}}>Sign in to continue</div>
      </div>}
      <div style={card}>
        {!isWall&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:20}}>
          <div style={{width:32,height:32,borderRadius:9,background:'linear-gradient(135deg,#1F3A2A 0%,#3A6A42 100%)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            {Ico.wombat('#fff',17)}
          </div>
          <span style={{fontSize:18,fontWeight:800,color:t.ink,letterSpacing:-0.3}}>WombatWatch</span>
        </div>}
        <form onSubmit={submit}>
          <input style={inp} placeholder="Email address" type="email" value={email} onChange={e=>setEmail(e.target.value)} autoComplete="email" autoCapitalize="none" autoFocus={isWall}/>
          <input style={inp} placeholder="Password" type="password" value={pw} onChange={e=>setPw(e.target.value)} autoComplete="current-password"/>
          {err&&<div style={{color:t.rose700,fontSize:13,marginBottom:10,padding:'9px 12px',background:t.rose50,borderRadius:8,lineHeight:1.4}}>{err}</div>}
          <button type="submit" disabled={loading||!email||!pw} style={{width:'100%',background:(loading||!email||!pw)?t.faint:t.f700,color:'#fff',borderRadius:14,padding:'14px 0',fontSize:16,fontWeight:700,marginTop:4,opacity:loading?0.7:1,transition:'background 0.2s'}}>
            {loading?'Please wait…':'Sign In'}
          </button>
        </form>
        <div style={{marginTop:16,textAlign:'center',fontSize:13,color:t.mid,lineHeight:1.5}}>
          Need access? Contact your WombatWatch coordinator<br/>to have an account set up for you.
        </div>
        {!isWall&&onClose&&<button onClick={onClose} style={{marginTop:14,width:'100%',textAlign:'center',color:t.mid,fontSize:14,padding:'8px 0'}}>
          Cancel
        </button>}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   APP
════════════════════════════════════════════════════════════════ */
function App(){
  const init=load();
  const [data,dispatch]=React.useReducer(reducer,{
    wombats:init.wombats,burrows:init.burrows,treatments:init.treatments,
    sightings:init.sightings,burrowLogs:init.burrowLogs,wombatPhotos:init.wombatPhotos,burrowPhotos:init.burrowPhotos,
  });
  const [screen,setScreen]=useState('dashboard');
  const [selectedId,setSelectedId]=useState(null);
  const [theme,setTheme]=useState(init.theme);
  const [modal,setModal]=useState(null);
  const [online,setOnline]=useState(navigator.onLine);
  const [queueLen,setQueueLen]=useState(()=>{try{return JSON.parse(localStorage.getItem(SQ_KEY)||'[]').length;}catch{return 0;}});
  const refreshQueue=()=>{try{setQueueLen(JSON.parse(localStorage.getItem(SQ_KEY)||'[]').length);}catch{}};
  const t=theme==='dark'?T.D:T.L;

  // ── Auth ─────────────────────────────────────────────────────
  const [authUser,setAuthUser]=useState(null);
  const [authProfile,setAuthProfile]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [authChecked,setAuthChecked]=useState(false);
  const explicitSignOut=React.useRef(false);
  const signedIn=!!authUser;

  const AUTH_CACHE='ww_auth_cache';
  const cacheUser=u=>{try{localStorage.setItem(AUTH_CACHE,JSON.stringify({id:u.id,email:u.email,user_metadata:u.user_metadata||{}}));}catch{}};
  const clearUserCache=()=>{try{localStorage.removeItem(AUTH_CACHE);}catch{}};
  const getCachedUser=()=>{try{return JSON.parse(localStorage.getItem(AUTH_CACHE)||'null');}catch{return null;}};

  // Wire the global auth-error hook so supaUpsert/supaDelete can force a sign-out
  // when they receive a 401 (e.g. account revoked while the volunteer was in the field).
  // We show the login screen rather than silently failing writes.
  useEffect(()=>{
    onAuthError=()=>{
      console.warn('[Auth] 401 received — clearing session');
      clearUserCache();
      setAuthUser(null);
      setAuthProfile(null);
      setAuthChecked(true);
    };
    return()=>{onAuthError=null;};
  },[]);

  useEffect(()=>{
    // Restore any existing session on page reload.
    // If offline and token expired, fall back to our own localStorage cache
    // so volunteers aren't stuck at the login screen in the field.
    const resolveAuth=(session)=>{
      if(session?.user){
        setAuthUser(session.user);
        cacheUser(session.user);
      }else{
        const cached=getCachedUser();
        if(cached)setAuthUser(cached);
      }
      setAuthChecked(true);
    };
    // Safety net: if Supabase hangs (network issue, CDN slow, etc.)
    // show the login screen after 9 seconds rather than a blank screen forever.
    // 9 s gives enough runway for a slow bush-connection to resolve.
    const fallback=setTimeout(()=>resolveAuth(null),9000);
    supa.auth.getSession()
      .then(({data:{session}})=>{clearTimeout(fallback);resolveAuth(session);})
      .catch(()=>{clearTimeout(fallback);resolveAuth(null);});
    // Live auth state changes (sign-in, sign-out, token refresh)
    const{data:{subscription}}=supa.auth.onAuthStateChange(async(event,session)=>{
      // Only honour SIGNED_OUT if the volunteer explicitly tapped Sign Out.
      // Any automatic sign-out (token expiry, network blip, etc.) is ignored.
      if(event==='SIGNED_OUT'){
        if(!explicitSignOut.current)return;
        explicitSignOut.current=false;
      }
      const user=session?.user||null;
      setAuthUser(user);
      if(user){
        cacheUser(user);
        // Load role / display name from profiles table
        supa.from('profiles').select('*').eq('id',user.id).single()
          .then(({data:p})=>setAuthProfile(p));
        // Show the sync bar briefly, then hide it — sync continues in background
        setSyncing(true);
        setTimeout(()=>setSyncing(false),2000);
        supaFullSync().then(merged=>{
          if(merged){
            // Detect and fix any duplicate W/B codes caused by offline users
            // independently auto-assigning the same number. Earliest record keeps
            // its code; later duplicates are silently renumbered upward.
            const{records:wombats,changed:changedW}=deduplicateCodes(merged.wombats,'W');
            const{records:burrows,changed:changedB}=deduplicateCodes(merged.burrows,'B');
            dispatch({type:'REPLACE_ALL',data:{...merged,wombats,burrows}});
            // Patch renumbered records back to Supabase so everyone stays consistent
            changedW.forEach(w=>supa.from('wombats').update({code:w.code}).eq('id',w.id).catch(()=>{}));
            changedB.forEach(b=>supa.from('burrows').update({code:b.code}).eq('id',b.id).catch(()=>{}));
          }else{
            dispatch({type:'REPLACE_ALL',data:{wombats:[],burrows:[],treatments:[],sightings:[],burrowLogs:[],wombatPhotos:[],burrowPhotos:[]}});
          }
          flushQueue(user.id).catch(()=>{});
        }).catch(e=>console.warn('[Supa] full sync error',e));
      }else{
        clearUserCache();
        setAuthProfile(null);
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  // ── Online/offline + queue flush ─────────────────────────────
  useEffect(()=>{
    const on=()=>{setOnline(true);if(authUser)flushQueue(authUser.id).catch(()=>{}).finally(refreshQueue);};

    const off=()=>setOnline(false);
    window.addEventListener('online',on);window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[authUser]);

  // ── Sync-aware dispatch ───────────────────────────────────────
  // Calls the reducer synchronously then pushes the action to Supabase.
  // Offline writes are queued in localStorage and flushed on reconnect.
  // ── Streak ───────────────────────────────────────────────────
  const [streak,setStreak]=useState(()=>loadStreak().count);
  const [recoveredWombat,setRecoveredWombat]=useState(null); // {name} when celebration shows

  const ACTIVITY_ACTIONS=new Set(['ADD_TREATMENT','ADD_SIGHTING','ADD_BURROW_LOG','ADD_WOMBAT','ADD_BURROW']);

  const syncDispatch=action=>{
    // Recovery celebration: catch a wombat being marked healthy from a treated state
    if(action.type==='UPDATE_WOMBAT'&&action.patch?.status==='healthy'){
      const prev=data.wombats.find(w=>w.id===action.id);
      if(prev&&(prev.status==='mange'||prev.status==='under_treatment')){
        setRecoveredWombat({name:prev.name});
      }
    }
    // Streak: touch on any logging activity
    if(ACTIVITY_ACTIONS.has(action.type)){
      const newCount=touchStreak();
      setStreak(newCount);
    }
    dispatch(action);
    if(authUser)syncAction(action,authUser.id).catch(e=>console.warn('[Supa]',e)).finally(refreshQueue);
    else refreshQueue();
  };

  const nav=(s,id=null)=>{setScreen(s);setSelectedId(id);setModal(null);};
  const toggleTheme=()=>{const nt=theme==='dark'?'light':'dark';setTheme(nt);localStorage.setItem(SK.theme,nt);};
  const toggleSignIn=async()=>{
    if(signedIn){
      explicitSignOut.current=true;
      clearUserCache();
      await supa.auth.signOut();
      setAuthUser(null);setAuthProfile(null);
    }else{
      setModal('sign-in');
    }
  };
  const openProfile=()=>setModal('profile');
  const onFAB=()=>setModal('fab');
  const [addAtLoc,setAddAtLoc]=useState(null);
  const onAddAt=(lat,lng,type)=>{setAddAtLoc({lat,lng});setModal(type==='wombat'?'add-wombat':'add-burrow');};
  const fabSelect=key=>{
    setModal(null);setAddAtLoc(null);
    if(key==='wombat')setModal('add-wombat');
    else if(key==='burrow')setModal('add-burrow');
  };

  // Show nothing while we check for an existing session (avoids flash)
  if(!authChecked)return <ThemeCtx.Provider value={t}>
    <div data-theme={theme} className="app" style={{background:t.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div style={{fontSize:11,letterSpacing:1.6,textTransform:'uppercase',color:t.f700,fontWeight:600}}>WombatWatch</div>
      <div style={{width:36,height:36,border:`3px solid ${t.sage50}`,borderTopColor:t.f700,borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
    </div>
  </ThemeCtx.Provider>;
  // Gate: show only the login wall until signed in
  if(!authUser)return <ThemeCtx.Provider value={t}><div data-theme={theme} className="app" style={{background:t.bg}}><SignInModal/></div></ThemeCtx.Provider>;

  return <ThemeCtx.Provider value={t}>
    <div data-theme={theme} className="app">
      {/* Supabase sync progress bar */}
      {syncing&&<div style={{position:'fixed',top:0,left:'max(0px,calc(50vw - 240px))',right:'max(0px,calc(50vw - 240px))',height:3,zIndex:9999,background:t.f700,transformOrigin:'left',animation:'syncBar 1.4s ease-in-out infinite'}}/>}
      {/* ── content area: grows to fill space above the tab bar ── */}
      <div className="content-area">
        {screen==='dashboard'&&<div className="scroll noscroll"><Dashboard data={data} nav={nav} onFAB={onFAB} online={online} pending={queueLen>0} openProfile={openProfile} streak={streak}/></div>}
        {screen==='activity'&&<div className="scroll noscroll"><ActivityScreen data={data} nav={nav}/></div>}
        {screen==='map'&&<MapScreen data={data} nav={nav} onFAB={onFAB} openProfile={openProfile} theme={theme} onAddAt={onAddAt}/>}
        {screen==='wombats'&&<div className="scroll noscroll"><WombatList data={data} nav={nav} onFAB={onFAB} openProfile={openProfile}/></div>}
        {screen==='wombat-profile'&&<div className="scroll noscroll"><WombatProfile wombatId={selectedId} data={data} nav={nav} dispatch={syncDispatch} openProfile={openProfile} authProfile={authProfile}/></div>}
        {screen==='burrows'&&<div className="scroll noscroll"><BurrowList data={data} nav={nav} onFAB={onFAB} openProfile={openProfile}/></div>}
        {screen==='burrow-profile'&&<div className="scroll noscroll"><BurrowProfile burrowId={selectedId} data={data} nav={nav} dispatch={syncDispatch} openProfile={openProfile} authProfile={authProfile}/></div>}
      </div>
      {/* ── single tab bar, pinned below content, never overlapping ── */}
      <div style={{flexShrink:0,height:'58px',background:'var(--tabbar)',borderTop:'1px solid var(--tabborder)'}}/>
      <TabBar active={screen} onNav={nav} onFAB={onFAB}/>

      {modal==='profile'&&<ProfileSheet onClose={()=>setModal(null)} onToggleTheme={toggleTheme} theme={theme} onEditProfile={()=>setModal('edit-profile')} onFAQ={()=>setModal('faq')} signedIn={signedIn} onToggleSignIn={toggleSignIn} data={data} onExport={()=>setModal('export')} onCSVImport={()=>setModal('csv-import')} authUser={authUser} authProfile={authProfile}/>}
      {modal==='edit-profile'&&<EditProfileModal onClose={()=>setModal(null)}/>}
      {modal==='faq'&&<FAQSheet onClose={()=>setModal(null)}/>}
      {modal==='export'&&<ExportSheet data={data} onClose={()=>setModal(null)}/>}
      {modal==='csv-import'&&<CSVImportModal onClose={()=>setModal(null)} onImportWombats={wombats=>{syncDispatch({type:'IMPORT_WOMBATS',wombats});nav('wombats');}} onImportBurrows={burrows=>{syncDispatch({type:'IMPORT_BURROWS',burrows});nav('burrows');}}/>}
      {modal==='fab'&&<FABSheet onClose={()=>setModal(null)} onSelect={fabSelect}/>}
      {modal==='add-wombat'&&<AddWombatModal burrows={data.burrows} initialLocation={addAtLoc} nextCode={nextWombatCode(data.wombats)} onClose={()=>{setModal(null);setAddAtLoc(null);}} onSave={(w,linkedBurrowId,photo)=>{syncDispatch({type:'ADD_WOMBAT',wombat:w});if(linkedBurrowId)syncDispatch({type:'LINK_WOMBAT_BURROW',wombatId:w.id,burrowId:linkedBurrowId});if(photo)syncDispatch({type:'ADD_WOMBAT_PHOTO',photo});setModal(null);setAddAtLoc(null);nav('wombat-profile',w.id);}}/>}
      {modal==='add-burrow'&&<AddBurrowModal initialLocation={addAtLoc} nextCode={nextBurrowCode(data.burrows)} wombats={data.wombats} onClose={()=>{setModal(null);setAddAtLoc(null);}} onSave={b=>{syncDispatch({type:'ADD_BURROW',burrow:b});(b.wombatIds||[]).forEach(wId=>syncDispatch({type:'LINK_WOMBAT_BURROW',wombatId:wId,burrowId:b.id}));setModal(null);setAddAtLoc(null);nav('burrow-profile',b.id);}}/>}
      {modal==='add-sighting'&&<AddSightingModal wombats={data.wombats} onClose={()=>setModal(null)} onSave={s=>{syncDispatch({type:'ADD_SIGHTING',sighting:s});setModal(null);}}/>}
      {modal==='sign-in'&&<SignInModal onClose={()=>setModal(null)}/>}
      {recoveredWombat&&<RecoveryModal name={recoveredWombat.name} onClose={()=>setRecoveredWombat(null)}/>}
    </div>
  </ThemeCtx.Provider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
