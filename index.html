   MAP COMPONENTS
   GeoSearch:      Nominatim address autocomplete (debounced 400ms).
                   onSelect({lat,lng,address}) / onCancel()
   MapPickerModal: full-screen map sheet for choosing a lat/lng.
                   Bottom-sheet style; GPS snap button; backdrop-dismiss.
   MiniMap:        small static Leaflet embed used on profile screens.
════════════════════════════════════════════════════════════════ */
function GeoSearch({onSelect,onCancel}){
  const t=useTheme();
  const [q,setQ]=useState('');
  // results: array of normalised {lat,lng,main,sub,addr,locality} objects
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [notFound,setNotFound]=useState(false);
  const timerRef=useRef(null);

  // ── Normalise a Photon GeoJSON feature ────────────────────────
  const fromPhoton=r=>{
    const p=r.properties;
    const[lng,lat]=r.geometry.coordinates;
    const num=p.housenumber,street=p.street,name=p.name;
    const suburb=p.suburb||p.quarter||p.district;
    const city=p.city||p.town||p.village||p.county;
    const state=p.state;
    let main='';
    if(num&&street)main=`${num} ${street}`;
    else if(name&&street&&name!==street)main=name;
    else if(street)main=street;
    else main=name||'Unknown';
    const sub=[suburb||city,state].filter(Boolean).join(', ');
    const addr=[num&&street?`${num} ${street}`:name||street,suburb||city,state].filter(Boolean).join(', ');
    const locality=suburb||city||state||addr;
    return{lat,lng,main,sub,addr,locality,_src:'photon'};
  };

  // ── Normalise a Nominatim JSON result ─────────────────────────
  const fromNominatim=r=>{
    const lat=parseFloat(r.lat),lng=parseFloat(r.lon);
    const a=r.address||{};
    const num=a.house_number,street=a.road;
    const suburb=a.suburb||a.village||a.hamlet;
    const city=a.town||a.city||a.county;
    const state=a.state;
    let main='';
    if(num&&street)main=`${num} ${street}`;
    else if(street)main=street;
    else main=(r.display_name||'').split(',')[0];
    const sub=[suburb||city,state].filter(Boolean).join(', ');
    const addr=[num&&street?`${num} ${street}`:street,suburb||city,state].filter(Boolean).join(', ');
    const locality=suburb||city||state||addr;
    return{lat,lng,main,sub,addr,locality,_src:'nominatim'};
  };

  const search=val=>{
    clearTimeout(timerRef.current);
    setNotFound(false);
    if(!val.trim()||val.length<3){setResults([]);setLoading(false);return;}
    setLoading(true);
    timerRef.current=setTimeout(async()=>{
      try{
        // Run both Photon and Nominatim in parallel for best coverage.
        // Photon (Komoot) — fast, good house-number data.
        //   location_bias centred on the operational area (Macdonald Valley,
        //   Webbs Creek, Colo, Wrights Creek, Fernances, Wisemans Ferry).
        // Nominatim — OSM + GNAF data; better rural NSW property coverage.
        //   viewbox matches the offline tile area; bounded=0 allows wider hits.
        const photonUrl=`https://photon.komoot.io/api/?q=${encodeURIComponent(val)}&limit=7&lang=en&lon=150.87&lat=-33.22&location_bias_scale=0.6`;
        const nominatimUrl=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(val)}&format=json&limit=6&countrycodes=au&viewbox=150.52,-33.58,151.18,-32.88&bounded=0&addressdetails=1`;
        const[photonRes,nominatimRes]=await Promise.allSettled([
          fetch(photonUrl,{headers:{'Accept':'application/json'}}).then(r=>r.json()),
          fetch(nominatimUrl,{headers:{'Accept':'application/json','Accept-Language':'en'}}).then(r=>r.json()),
        ]);
        const photonItems=(photonRes.status==='fulfilled'?(photonRes.value.features||[]):[]).map(fromPhoton);
        const nominatimItems=(nominatimRes.status==='fulfilled'?(nominatimRes.value||[]):[]).map(fromNominatim);
        // Merge: Photon first, then any Nominatim result not within 100 m of an existing hit
        const merged=[...photonItems];
        nominatimItems.forEach(ni=>{
          const dup=merged.some(pi=>Math.abs(pi.lat-ni.lat)<0.001&&Math.abs(pi.lng-ni.lng)<0.001);
          if(!dup)merged.push(ni);
        });
        setResults(merged.slice(0,10));
        setNotFound(merged.length===0);
      }catch{setResults([]);setNotFound(true);}
      finally{setLoading(false);}
    },400);
  };

  const spinner=<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={t.mid} strokeWidth="2.5" strokeLinecap="round" style={{animation:'spin 0.8s linear infinite',flexShrink:0}}><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>;

  return(
    <div style={{border:`1.5px solid ${t.f700}`,borderRadius:14,overflow:'hidden',background:t.surface,boxShadow:t.shadow}}>
      {/* Input row */}
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',borderBottom:`1px solid ${t.div}`}}>
        {loading?spinner:Ico.search(t.mid,14)}
        <input
          value={q}
          onChange={e=>{setQ(e.target.value);search(e.target.value);}}
          placeholder="Search address or place…"
          autoFocus
          autoCapitalize="none"
          autoCorrect="off"
          spellCheck={false}
          style={{flex:1,fontSize:15,color:t.ink,background:'none',border:'none',outline:'none'}}
        />
        <button onClick={onCancel} style={{fontSize:12.5,color:t.mid,background:'none',border:'none',fontWeight:600,cursor:'pointer',flexShrink:0,padding:'2px 4px'}}>Cancel</button>
      </div>
      {/* Results */}
      {results.length>0&&
        <div style={{maxHeight:210,overflowY:'auto'}}>
          {results.map((r,i)=>(
            <button key={i}
              onClick={()=>onSelect({lat:r.lat,lng:r.lng,address:r.addr,locality:r.locality})}
              style={{display:'flex',alignItems:'flex-start',gap:10,width:'100%',padding:'11px 14px',background:'none',border:'none',borderBottom:`1px solid ${t.div}`,textAlign:'left',cursor:'pointer'}}>
              <div style={{marginTop:2,flexShrink:0}}>{Ico.pin(t.lav500,11)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13.5,fontWeight:600,color:t.ink,lineHeight:1.3}}>{r.main}</div>
                {r.sub&&<div style={{fontSize:11.5,color:t.mid,marginTop:2}}>{r.sub}</div>}
              </div>
            </button>
          ))}
        </div>
      }
      {notFound&&q.length>=3&&!loading&&
        <div style={{padding:'14px',fontSize:13,color:t.mid,textAlign:'center'}}>No results found — try a different search</div>
      }
      {!loading&&q.length>0&&q.length<3&&
        <div style={{padding:'10px 14px',fontSize:12,color:t.faint}}>Keep typing…</div>
      }
    </div>
  );
}

// Reverse geocode lat/lng → closest suburb / locality name.
// Uses Nominatim at zoom=14 (neighbourhood level). Returns null on failure.
async function reverseGeocode(lat,lng){
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),5000); // 5 s field timeout
    const res=await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=14&accept-language=en`,
      {headers:{'Accept':'application/json'},signal:ctrl.signal}
    );
    clearTimeout(timer);
    const d=await res.json();
    const a=d.address||{};
    // 'locality' is how Nominatim encodes small rural communities in Australia
    // (e.g. "St Albans", "Upper Macdonald") — must be checked before suburb/hamlet
    // which are rarely populated for these areas.
    // Last resort: strip bureaucratic LGA suffixes from county (e.g. "Hawkesbury
    // City Council" → "Hawkesbury") rather than showing the raw LGA name.
    const county=a.county
      ? a.county.replace(/\s+(City|Shire|Regional|Rural)\s+Council\b/i,'').trim()
      : null;
    return a.locality||a.hamlet||a.village||a.suburb||a.quarter
          ||a.town||a.city_district||a.city||a.municipality||county
          ||a.state_district||null;
  }catch{return null;}
}

// Silently fill in missing location strings for wombats/burrows that have
// GPS coordinates but no suburb name — happens when records were created offline
// and the Nominatim call failed. Runs after a full sync, online only.
// Rate-limited to one request per 1.2 s to respect Nominatim's usage policy.
// Returns true if the stored location string looks like a record code (e.g. "B0001",
// "W0003") or an LGA/council name (e.g. "Hawkesbury City Council") rather than a
// real suburb/locality — these need to be re-geocoded.
const isCodeLike=loc=>!!loc&&(/^[BWbw]\d{1,6}$/.test(loc.trim())||/\bCouncil\b/i.test(loc));
async function geocodeBackfill(data,dispatch){
  if(!navigator.onLine)return;
  const needs=[
    // Include records with no location OR records whose stored "location" is
    // actually a burrow/wombat code from an older data-entry bug.
    ...data.wombats.filter(w=>w.lat&&w.lng&&(!w.location||isCodeLike(w.location))).map(w=>({kind:'wombat',id:w.id,lat:w.lat,lng:w.lng})),
    ...data.burrows.filter(b=>b.lat&&b.lng&&(!b.location||isCodeLike(b.location))).map(b=>({kind:'burrow',id:b.id,lat:b.lat,lng:b.lng})),
  ];
  if(!needs.length)return;
  console.log(`[Geocode] backfilling ${needs.length} record(s)…`);
  for(const item of needs){
    await new Promise(r=>setTimeout(r,1200));
    const loc=await reverseGeocode(item.lat,item.lng);
    if(!loc)continue;
    // dispatch sets _sync:false — flushQueue will push to Supabase on next flush
    if(item.kind==='wombat') dispatch({type:'UPDATE_WOMBAT',id:item.id,patch:{location:loc}});
    else dispatch({type:'UPDATE_BURROW',id:item.id,patch:{location:loc}});
  }
}

function MapPickerModal({onClose,onConfirm,initialLat,initialLng}){
  const t=useTheme();
  const mapRef=useRef(null);
  const leafRef=useRef(null);
  const tileLayerRef=useRef(null);
  const markerRef=useRef(null);
  const [picked,setPicked]=useState(initialLat?{lat:initialLat,lng:initialLng}:null);
  const [satellite,setSatellite]=useState(false);

  // Map init — create the Leaflet instance once. Tile layer is handled by a separate effect below.
  useEffect(()=>{
    if(!mapRef.current||leafRef.current)return;
    const initMap=(lat,lng,zoom)=>{
      if(leafRef.current)return; // guard against double-init if GPS comes back late
      const map=L.map(mapRef.current,{zoomControl:true}).setView([lat,lng],zoom);
      if(initialLat){markerRef.current=L.marker([initialLat,initialLng]).addTo(map);}
      map.on('click',e=>{
        const{lat,lng}=e.latlng;
        if(markerRef.current)markerRef.current.remove();
        markerRef.current=L.marker([lat,lng]).addTo(map);
        setPicked({lat,lng});
      });
      leafRef.current=map;
    };
    if(initialLat){
      initMap(initialLat,initialLng,14);
    }else if(navigator.geolocation){
      initMap(-33.22,150.87,11); // operational area default
      navigator.geolocation.getCurrentPosition(
        pos=>{ if(leafRef.current)leafRef.current.setView([pos.coords.latitude,pos.coords.longitude],14); },
        ()=>{},{timeout:4000,maximumAge:30000}
      );
    }else{
      initMap(-33.22,150.87,11);
    }
    return()=>{if(leafRef.current){leafRef.current.remove();leafRef.current=null;}};
  },[]);

  // Tile layer — runs after init effect on mount, and again whenever satellite toggles
  useEffect(()=>{
    const map=leafRef.current;if(!map)return;
    if(tileLayerRef.current){tileLayerRef.current.remove();tileLayerRef.current=null;}
    tileLayerRef.current=L.tileLayer(
      satellite?TILE_SAT:TILE_OSM,
      {attribution:satellite?ATTR_SAT:ATTR_OSM,maxZoom:19}
    ).addTo(map);
  },[satellite]);
  return(
    // Backdrop — tap to cancel
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:1100,display:'flex',flexDirection:'column',justifyContent:'flex-end',alignItems:'center',background:'rgba(0,0,0,0.55)',paddingTop:'calc(var(--sat) + 48px)',paddingBottom:'calc(72px + var(--sab))'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:480,height:'88%',display:'flex',flexDirection:'column',background:t.bg,borderRadius:20,overflow:'hidden',boxShadow:'0 -8px 32px rgba(0,0,0,0.25)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px 12px',background:t.surface,borderBottom:`1px solid ${t.div}`,flexShrink:0}}>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:18,background:t.soft,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
            {Ico.close(t.ink,16)}
          </button>
          <div style={{fontSize:17,fontWeight:700,color:t.ink,flex:1}}>Pick location</div>
          {picked&&<button onClick={()=>onConfirm(picked)} style={{padding:'8px 16px',borderRadius:12,background:t.f700,color:'#fff',fontSize:13,fontWeight:700,border:'none',cursor:'pointer'}}>Confirm</button>}
        </div>
        <div style={{flex:1,position:'relative'}}>
          <div ref={mapRef} style={{width:'100%',height:'100%'}}/>
          {/* Map control buttons: GPS snap + satellite toggle */}
          <div style={{position:'absolute',bottom:16,right:16,zIndex:500,display:'flex',flexDirection:'column',gap:8}}>
            <button
              onClick={()=>{
                if(!navigator.geolocation)return;
                navigator.geolocation.getCurrentPosition(pos=>{
                  const{latitude:lat,longitude:lng}=pos.coords;
                  if(leafRef.current){
                    leafRef.current.setView([lat,lng],16);
                    if(markerRef.current)markerRef.current.remove();
                    markerRef.current=L.marker([lat,lng]).addTo(leafRef.current);
                    setPicked({lat,lng});
                  }
                },()=>alert('Could not get your location. Check permissions.'),{timeout:8000,maximumAge:10000});
              }}
              style={{width:44,height:44,borderRadius:12,background:t.surface,boxShadow:'0 2px 10px rgba(0,0,0,0.2)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}
            >
              {Ico.crosshair(t.f700,20)}
            </button>
            {/* Satellite toggle */}
            <button
              onClick={()=>setSatellite(v=>!v)}
              title={satellite?'Street map':'Satellite'}
              style={{width:44,height:44,borderRadius:12,background:satellite?t.f700:t.surface,boxShadow:'0 2px 10px rgba(0,0,0,0.2)',border:satellite?'none':`1px solid ${t.div}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}
            >
              {Ico.layers(satellite?'#fff':t.f700,20)}
            </button>
          </div>
        </div>
        <div style={{padding:'12px 20px calc(var(--sab)+16px)',background:t.surface,borderTop:`1px solid ${t.div}`,flexShrink:0}}>
          {picked
            ? <button onClick={()=>onConfirm(picked)} style={{width:'100%',height:50,borderRadius:16,background:t.f700,color:'#fff',fontSize:15,fontWeight:700,border:'none',cursor:'pointer'}}>
                Use this location — {picked.lat.toFixed(4)}, {picked.lng.toFixed(4)}
              </button>
            : <div style={{textAlign:'center',color:t.mid,fontSize:14,padding:'12px 0'}}>Tap the map to place a pin</div>
          }
        </div>
      </div>
    </div>
  );
}

/* ── MINI MAP ── */
function MiniMap({lat,lng,label,height=200,onOpen}){
  const t=useTheme();
  const containerRef=useRef(null);
  const mapObjRef=useRef(null);
  useEffect(()=>{
    if(!containerRef.current||!lat||!lng)return;
    if(mapObjRef.current){mapObjRef.current.remove();mapObjRef.current=null;}
    const m=L.map(containerRef.current,{zoomControl:false,dragging:false,scrollWheelZoom:false,doubleClickZoom:false,boxZoom:false,keyboard:false,attributionControl:false,touchZoom:false});
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(m);
    m.setView([lat,lng],15);
    const icon=L.divIcon({html:`<div style="width:16px;height:16px;background:#2E5536;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.45)"></div>`,className:'',iconSize:[16,16],iconAnchor:[8,8]});
    L.marker([lat,lng],{icon}).addTo(m);
    mapObjRef.current=m;
    return()=>{if(mapObjRef.current){mapObjRef.current.remove();mapObjRef.current=null;}};
  },[lat,lng]);
  if(!lat||!lng)return <div style={{background:t.soft,borderRadius:16,height,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8}}>
    {Ico.map(t.faint,22)}
    <div style={{fontSize:13,color:t.faint}}>No location recorded</div>
  </div>;
  return <div style={{borderRadius:16,overflow:'hidden',height,position:'relative',background:t.soft}}>
    <div ref={containerRef} style={{width:'100%',height:'100%'}}/>
    <button onClick={onOpen||(() => window.open(`https://maps.google.com/?q=${lat},${lng}`,'_blank'))}
      style={{position:'absolute',bottom:10,right:10,background:'rgba(255,255,255,0.92)',border:'none',borderRadius:999,padding:'6px 12px',fontSize:12,fontWeight:700,color:'#1F3A2A',boxShadow:'0 2px 8px rgba(0,0,0,0.2)',cursor:'pointer',display:'flex',alignItems:'center',gap:5,zIndex:400}}>
      {Ico.location('#2E5536',12)} Open in Maps
    </button>
    {label&&<div style={{position:'absolute',top:10,left:10,background:'rgba(255,255,255,0.92)',borderRadius:999,padding:'4px 10px',fontSize:12,fontWeight:600,color:'#1F3A2A',boxShadow:'0 1px 4px rgba(0,0,0,0.15)',zIndex:400}}>{label}</div>}
  </div>;
}

function AddTreatmentModal({wombatId,wombatName,wombatStatus='under_treatment',onClose,onSave,burrows=[]}){
  const t=useTheme();
  const savedUser=typeof localStorage!=='undefined'?localStorage.getItem(SK.userName)||'':'';
  const [form,setForm]=useState({at:today(),product:'cydectin',dose:'',method:'',severity:null,regions:{},by:savedUser,note:''});
  const [markRecovered,setMarkRecovered]=useState(false);
  const [attachedPhotos,setAttachedPhotos]=useState([]);
  const [location,setLocation]=useState(null);
  const [linkedBurrow,setLinkedBurrow]=useState(null);
  const [showMore,setShowMore]=useState(false);
  const [showMapPicker,setShowMapPicker]=useState(false);
  const [showAddressInput,setShowAddressInput]=useState(false);
  const [addressText,setAddressText]=useState('');
  const [burrowSearch,setBurrowSearch]=useState('');
  const [showBurrowSearch,setShowBurrowSearch]=useState(false);
  const useCurrentLocation=()=>{
    if(!navigator.geolocation)return alert('Geolocation is not available on this device.');
    navigator.geolocation.getCurrentPosition(
      async pos=>{
        const lat=pos.coords.latitude,lng=pos.coords.longitude;
        setLocation({lat,lng});
        const locality=await reverseGeocode(lat,lng);
        if(locality)setLocation({lat,lng,address:locality});
      },
      ()=>alert('Could not get your location. Please check permissions.')
    );
  };

  </ModalWrap>;

/* Convert a compass heading in degrees to a 16-point cardinal label */
function headingToCardinal(deg){
  const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return d[Math.round(((deg%360)+360)%360/22.5)%16];
}

/* Reusable compass-assisted orientation field.
   User points phone TOWARD the entrance; we flip +180° to record the outward-facing aspect. */
function CompassField({value,onChange}){
  const t=useTheme();
  const [status,setStatus]=useState('idle'); /* idle | reading | done | denied | unsupported */
  const capture=async()=>{
    if(status==='reading') return;
    if(!window.DeviceOrientationEvent){setStatus('unsupported');return;}
    setStatus('reading');
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      try{const p=await DeviceOrientationEvent.requestPermission();if(p!=='granted'){setStatus('denied');return;}}
      catch{setStatus('denied');return;}
    }
    const readings=[];
    const handler=e=>{
      const h=e.webkitCompassHeading!=null?e.webkitCompassHeading
              :(e.absolute&&e.alpha!=null?(360-e.alpha+360)%360:null);
      if(h==null) return;
      readings.push(h);
      if(readings.length>=6){
        window.removeEventListener('deviceorientationabsolute',handler);
        window.removeEventListener('deviceorientation',handler);
        const aspect=((readings.reduce((a,b)=>a+b,0)/readings.length)+180)%360;
        onChange(`${headingToCardinal(aspect)} (${Math.round(aspect)}°)`);
        setStatus('done');
      }
    };
    window.addEventListener('deviceorientationabsolute',handler);
    window.addEventListener('deviceorientation',handler);
    setTimeout(()=>{
      window.removeEventListener('deviceorientationabsolute',handler);
      window.removeEventListener('deviceorientation',handler);
      if(readings.length>0){
        const aspect=((readings.reduce((a,b)=>a+b,0)/readings.length)+180)%360;
        onChange(`${headingToCardinal(aspect)} (${Math.round(aspect)}°)`);
        setStatus('done');
      } else setStatus('unsupported');
    },5000);
  };
  const btnLabel={idle:'Detect',reading:'…',done:'Re-detect',denied:'Denied',unsupported:'N/A'}[status];
  const hint={
    idle:"Tap Detect, then point your phone toward the entrance. The bearing recorded will be the direction it faces outward.",
    reading:'Point your phone toward the entrance — the app records the outward-facing direction automatically.',
    done:'Captured. Tap Re-detect to update.',
    denied:'Permission denied — enter orientation manually.',
    unsupported:'Compass not available on this device — enter manually.',
  }[status];
  return <>
    <div style={{display:'flex',gap:8,alignItems:'center'}}>
      <div style={{flex:1}}><FInput value={value} onChange={onChange} placeholder="e.g. NE (48°)"/></div>
      <button onClick={capture} disabled={status==='reading'} style={{flexShrink:0,padding:'10px 14px',borderRadius:12,background:status==='done'?t.sage50:t.f700,color:status==='done'?t.f700:'#fff',border:'none',fontSize:12.5,fontWeight:600,cursor:'pointer',opacity:status==='reading'?0.6:1}}>
        {status==='reading'
          ? <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:10,borderRadius:'50%',border:'2px solid currentColor',borderTopColor:'transparent',display:'inline-block',animation:'spin 0.8s linear infinite'}}/>…</span>
          : btnLabel}
      </button>
    </div>
    <div style={{fontSize:11.5,color:t.mid,marginTop:5,lineHeight:1.4}}>{hint}</div>
  </>;
}

    if(!navigator.geolocation)return alert('Geolocation is not available on this device.');
    navigator.geolocation.getCurrentPosition(
      async pos=>{
        const lat=pos.coords.latitude,lng=pos.coords.longitude;

        const locality=await reverseGeocode(lat,lng);
        if(locality)setLocation({lat,lng,address:locality});
      },
      ()=>alert('Could not get your location. Please check permissions.')

  };

    const lng=linkedBurrow?linkedBurrow.lng:location?.lng??null;
    const locationStr=linkedBurrow?linkedBurrow.location:(location?.locality||location?.address||null);

    </FormField>
    <FormField label="Age Class">
      <ChipPicker value={form.ageClass} onChange={v=>set('ageClass',v)} options={[{value:'joey',label:'Joey'},{value:'sub-adult',label:'Sub-adult'},{value:'adult',label:'Adult'}]}/>
    </FormField>
    <FormField label="Health Status" required>
      <ChipPicker value={form.status} onChange={v=>set('status',v)} options={[{value:'healthy',label:'Healthy'},{value:'under_treatment',label:'Treatment'}]}/>
    </FormField>
    <FormField label="First Seen Date" required><FInput type="date" value={form.firstSeen} onChange={v=>set('firstSeen',v)}/></FormField>
    <FormField label="Location" required>
      {linkedBurrow
        ? <div style={{background:t.soft,borderRadius:12,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0}}>
              {Ico.burrow(t.f700,14)}
              <div>
                <div style={{fontSize:13,fontWeight:600,color:t.ink}}>{linkedBurrow.name}</div>
                {linkedBurrow.location&&<div style={{fontSize:11,color:t.mid}}>{linkedBurrow.location}</div>}
              </div>
            </div>
            <button onClick={()=>{setLinkedBurrow(null);setBurrowSearch('');setShowBurrowSearch(false);}} style={{fontSize:12,color:t.mid,background:'none',border:'none',fontWeight:600,cursor:'pointer',flexShrink:0}}>Clear</button>
          </div>
        : location

                {location.address&&<div style={{fontSize:13,fontWeight:600,color:t.ink,marginBottom:2}}>{location.address}</div>}
                {location.lat&&<div style={{fontSize:12,color:t.mid,fontFamily:'monospace'}}>{location.lat.toFixed(5)}, {location.lng.toFixed(5)}</div>}
              </div>
              <button onClick={()=>{setLocation(null);setShowGeoSearch(false);}} style={{fontSize:12,color:t.mid,background:'none',border:'none',fontWeight:600,cursor:'pointer',flexShrink:0}}>Clear</button>
            </div>
          : <div style={{display:'flex',flexDirection:'column',gap:8}}>

                    <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderBottom:`1px solid ${t.div}`}}>
                      {Ico.search(t.mid,14)}
                      <input value={burrowSearch} onChange={e=>setBurrowSearch(e.target.value)} placeholder="Search burrows…" autoFocus style={{flex:1,fontSize:14,color:t.ink,background:'none',border:'none',outline:'none'}}/>
                      <button onClick={()=>{setShowBurrowSearch(false);setBurrowSearch('');}} style={{fontSize:12,color:t.mid,background:'none',border:'none',fontWeight:600,cursor:'pointer'}}>Cancel</button>
                    </div>
                    <div style={{maxHeight:150,overflowY:'auto'}}>
                      {filteredBurrows.length===0&&<div style={{padding:'12px',fontSize:13,color:t.mid,textAlign:'center'}}>No burrows found</div>}
                      {filteredBurrows.map(b=><button key={b.id} onClick={()=>{setLinkedBurrow(b);setShowBurrowSearch(false);setBurrowSearch('');}} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',background:'transparent',border:'none',borderBottom:`1px solid ${t.div}`,textAlign:'left',cursor:'pointer'}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,color:t.ink}}>{b.name}</div>

                        </div>

                : showGeoSearch

/* ── ADD SIGHTING MODAL ── */
function AddSightingModal({wombats,onClose,onSave}){
  const t=useTheme();
  const [form,setForm]=useState({wombatId:wombats[0]?.id||'',at:today()+'T08:00',lat:'',lng:'',note:''});

  };
  return <ModalWrap title="Log Sighting" subtitle="Record a wombat spotted in the field" onClose={onClose} saveLabel="Save Sighting" onSave={()=>{

      <div style={{display:'flex',gap:8,marginBottom:8}}>

        <FInput value={form.lng} onChange={v=>set('lng',v)} placeholder="Longitude"/>
      </div>
      <button onClick={getGPS} style={{padding:'8px 14px',borderRadius:10,background:t.f700,color:'#fff',fontSize:12.5,fontWeight:600,border:'none',display:'flex',alignItems:'center',gap:6}}>{Ico.location('#fff',14)} Use Current Location</button>

/* ════════════════════════════════════════════════════════════════
   REDUCER
   Pure function — all state mutations go through here.
   Each case saves the affected slice to localStorage via save().
   Bidirectional wombat↔burrow links are kept in sync by
   LINK_WOMBAT_BURROW; always use that action when associating them.
   ADD_BURROW_LOG also updates burrow.status and burrow.lastChecked
   as a side-effect.
════════════════════════════════════════════════════════════════ */
function reducer(state,action){
  // NOTE ON PHOTO SAVES: all photo arrays are saved via .map(noB64) which strips
  // base64 dataUrls before writing to localStorage. The actual blobs live in
  // IndexedDB (see idbPutPhoto). HYDRATE_PHOTO_DATA re-merges IDB data into
  // state after startup — it does NOT write to localStorage.
  switch(action.type){

    // ── Wombats ──────────────────────────────────────────────────
    case 'ADD_WOMBAT':{const wombats=[...state.wombats,action.wombat];save('w',wombats);return{...state,wombats};}
    case 'UPDATE_WOMBAT':{const wombats=state.wombats.map(w=>w.id===action.id?{...w,...action.patch,_sync:false}:w);save('w',wombats);return{...state,wombats};}
    // _sync:false ensures local version wins on next supaFullSync merge even if the
    // page is refreshed before the async Supabase push completes (edit never gets lost).
    case 'MARK_WOMBAT_INACTIVE':{
      // Sets status to 'deceased' or 'missing' and records the inactiveAt/inactiveCause/inactiveNotes fields.
      const wombats=state.wombats.map(w=>w.id===action.id?{...w,status:action.status,inactiveAt:action.inactiveAt,inactiveCause:action.inactiveCause||null,inactiveNotes:action.inactiveNotes||null,_sync:false}:w);
      save('w',wombats);return{...state,wombats};
    }
    case 'MARK_WOMBAT_ACTIVE':{
      // Restores an inactive wombat to an active status, clearing inactive fields.
      const wombats=state.wombats.map(w=>w.id===action.id?{...w,status:action.status,inactiveAt:null,inactiveCause:null,inactiveNotes:null,_sync:false}:w);
      save('w',wombats);return{...state,wombats};
    }
    case 'IMPORT_WOMBATS':{const wombats=[...state.wombats,...action.wombats];save('w',wombats);return{...state,wombats};}
    case 'DELETE_WOMBAT':{
      // Cascade: remove all child records (treatments, sightings, photos)
      // and unlink from any burrows that referenced this wombat.
      // ON DELETE CASCADE in Supabase handles the server side; this mirrors it locally.
      const wombats=state.wombats.filter(w=>w.id!==action.id);
      const treatments=state.treatments.filter(tr=>tr.wombatId!==action.id);
      const sightings=state.sightings.filter(s=>s.wombatId!==action.id);
      const wombatPhotos=state.wombatPhotos.filter(p=>p.wombatId!==action.id);
      const burrows=state.burrows.map(b=>b.wombatIds?.includes(action.id)?{...b,wombatIds:b.wombatIds.filter(id=>id!==action.id)}:b);
      save('w',wombats);save('t',treatments);save('s',sightings);save('wp',wombatPhotos.map(noB64));save('b',burrows);
      return{...state,wombats,treatments,sightings,wombatPhotos,burrows};
    }

    // ── Burrows ──────────────────────────────────────────────────
    case 'ADD_BURROW':{const burrows=[...state.burrows,action.burrow];save('b',burrows);return{...state,burrows};}
    case 'IMPORT_BURROWS':{const burrows=[...state.burrows,...action.burrows];save('b',burrows);return{...state,burrows};}
    case 'UPDATE_BURROW':{const burrows=state.burrows.map(b=>b.id===action.id?{...b,...action.patch,_sync:false}:b);save('b',burrows);return{...state,burrows};}
    // _sync:false mirrors the UPDATE_WOMBAT fix: local edit wins merge until server confirms.
    case 'DELETE_BURROW':{
      // Cascade: remove all child records (logs, photos) and unlink from wombats.
      const burrows=state.burrows.filter(b=>b.id!==action.id);
      const burrowLogs=state.burrowLogs.filter(l=>l.burrowId!==action.id);
      const burrowPhotos=state.burrowPhotos.filter(p=>p.burrowId!==action.id);
      const wombats=state.wombats.map(w=>w.burrowIds?.includes(action.id)?{...w,burrowIds:w.burrowIds.filter(id=>id!==action.id)}:w);
      save('b',burrows);save('bl',burrowLogs);save('bp',burrowPhotos.map(noB64));save('w',wombats);
      return{...state,burrows,burrowLogs,burrowPhotos,wombats};
    }

    // ── Treatments ───────────────────────────────────────────────
    case 'ADD_TREATMENT':{const treatments=[...state.treatments,action.treatment];save('t',treatments);return{...state,treatments};}
    case 'DELETE_TREATMENT':{const treatments=state.treatments.filter(tr=>tr.id!==action.treatmentId);save('t',treatments);return{...state,treatments};}

    // ── Sightings ────────────────────────────────────────────────
    case 'ADD_SIGHTING':{const sightings=[...state.sightings,action.sighting];save('s',sightings);return{...state,sightings};}

    // ── Photos ───────────────────────────────────────────────────
    // base64 blobs live in IDB; localStorage only holds metadata (dataUrl:null).
    case 'ADD_WOMBAT_PHOTO':{const wombatPhotos=[...state.wombatPhotos,action.photo];save('wp',wombatPhotos.map(noB64));return{...state,wombatPhotos};}
    case 'SET_PROFILE_PHOTO':{
      // Mark one photo as the profile image; clear the flag on all others for this wombat.
      // _sync:false on all affected photos so isProfile changes survive any concurrent server pull.
      const wombatPhotos=state.wombatPhotos.map(p=>p.wombatId===action.wombatId?{...p,isProfile:p.id===action.photoId,_sync:false}:p);
      save('wp',wombatPhotos.map(noB64));return{...state,wombatPhotos};
    }
    case 'DELETE_WOMBAT_PHOTO':{const wombatPhotos=state.wombatPhotos.filter(p=>p.id!==action.photoId);save('wp',wombatPhotos.map(noB64));return{...state,wombatPhotos};}
    case 'ADD_BURROW_PHOTO':{const burrowPhotos=[...state.burrowPhotos,action.photo];save('bp',burrowPhotos.map(noB64));return{...state,burrowPhotos};}
    case 'SET_BURROW_PROFILE_PHOTO':{
      // Mark one photo as the profile image; clear the flag on all others for this burrow.
      // _sync:false on all affected photos so isProfile changes survive any concurrent server pull.
      const burrowPhotos=state.burrowPhotos.map(p=>p.burrowId===action.burrowId?{...p,isProfile:p.id===action.photoId,_sync:false}:p);
      save('bp',burrowPhotos.map(noB64));return{...state,burrowPhotos};
    }
    case 'DELETE_BURROW_PHOTO':{const burrowPhotos=state.burrowPhotos.filter(p=>p.id!==action.photoId);save('bp',burrowPhotos.map(noB64));return{...state,burrowPhotos};}
    case 'HYDRATE_PHOTO_DATA':{
      // Runs once on startup (and after every REPLACE_ALL sync).
      // Merges IDB blobs back into in-memory state so photos render.
      // Does NOT write to localStorage — blobs belong in IDB only.
      const m=action.map; // { [photoId]: dataUrl }
      const wombatPhotos=(state.wombatPhotos||[]).map(p=>m[p.id]?{...p,dataUrl:m[p.id]}:p);
      const burrowPhotos=(state.burrowPhotos||[]).map(p=>m[p.id]?{...p,dataUrl:m[p.id]}:p);
      return{...state,wombatPhotos,burrowPhotos};
    }

    // ── Burrow logs ──────────────────────────────────────────────
    case 'DELETE_BURROW_LOG':{
      const bl=state.burrowLogs.filter(l=>l.id!==action.logId);
      // Revert burrow.status and burrow.lastChecked to the most recent remaining log.
      // If no logs remain, leave the existing values in place.
      // _sync:false ensures the reverted burrow state wins any concurrent server pull.
      const remaining=bl.filter(l=>l.burrowId===action.burrowId).sort((a,b)=>new Date(b.at)-new Date(a.at));
      const burs=state.burrows.map(b=>b.id===action.burrowId?{...b,status:remaining[0]?.status||b.status,lastChecked:remaining[0]?.at||b.lastChecked,_sync:false}:b);
      save('bl',bl);save('b',burs);
      return{...state,burrowLogs:bl,burrows:burs};}
    case 'ADD_BURROW_LOG':{
      const bl=[...state.burrowLogs,action.log];
      // Mirror log data onto the parent burrow: status, lastChecked, entrance
      // measurements, and habitat fields (substrate, vegetation, trailCamera).
      // Only fields present in the log are patched — missing fields are left alone.
      // _sync:false on the burrow ensures the update isn't overwritten by a server
      // pull that completes before the async Supabase push finishes.
      const logPatch={status:action.log.status,lastChecked:action.log.at};
      if(action.log.heightCm!=null&&action.log.heightCm!=='') logPatch.entranceHeightCm=action.log.heightCm;
      if(action.log.widthCm!=null&&action.log.widthCm!=='') logPatch.entranceWidthCm=action.log.widthCm;
      if(action.log.orientation) logPatch.orientation=action.log.orientation;
      const burs=state.burrows.map(b=>{
        if(b.id!==action.log.burrowId) return b;
        const habitatPatch={};
        if(action.log.substrate) habitatPatch.substrate=action.log.substrate;
        if(action.log.vegetation) habitatPatch.vegetation=action.log.vegetation;
        if(action.log.trailCamera!==undefined) habitatPatch.trailCamera=action.log.trailCamera;
        return{...b,...logPatch,habitat:{...b.habitat,...habitatPatch},_sync:false};
      });
      save('bl',bl);save('b',burs);
      return{...state,burrowLogs:bl,burrows:burs};
    }

    // ── Links ────────────────────────────────────────────────────
    case 'LINK_WOMBAT_BURROW':{
      // Wombat↔burrow links are bidirectional: wombat.burrowIds and burrow.wombatIds
      // both need updating. Always use this action — never patch either array directly.
      // Deduplicates before adding so dispatching twice is safe.
      // _sync:false on both records ensures the link isn't dropped if a server pull
      // completes before the Supabase push finishes.
      const{wombatId,burrowId}=action;
      const wombats=state.wombats.map(w=>w.id===wombatId?{...w,burrowIds:[...(w.burrowIds||[]).filter(id=>id!==burrowId),burrowId],_sync:false}:w);
      const burrows=state.burrows.map(b=>b.id===burrowId?{...b,wombatIds:[...(b.wombatIds||[]).filter(id=>id!==wombatId),wombatId],_sync:false}:b);
      save('w',wombats);save('b',burrows);
      return{...state,wombats,burrows};
    }

    // ── Full sync ────────────────────────────────────────────────
    case 'REPLACE_ALL':{
      // Dispatched by supaFullSync after a successful server pull.
      // action.data is already queue-aware merged (local edits preserved).
      // After this runs, the App re-dispatches HYDRATE_PHOTO_DATA to
      // restore any IDB photo blobs that don't live in Supabase.
      const{wombats,burrows,treatments,sightings,burrowLogs,wombatPhotos,burrowPhotos}=action.data;
      save('w',wombats);save('b',burrows);save('t',treatments);
      save('s',sightings);save('bl',burrowLogs);save('wp',wombatPhotos.map(noB64));save('bp',burrowPhotos.map(noB64));
      return{...state,wombats,burrows,treatments,sightings,burrowLogs,wombatPhotos,burrowPhotos};
    }

    default:return state;
  }
}

/* ════════════════════════════════════════════════════════════════
   EDIT MODALS
   EditWombatModal: pre-populated form for updating a wombat record.
   EditBurrowModal: pre-populated form for updating a burrow record.
   Both are opened from the swipe-actions on the list tiles and save
   via UPDATE_WOMBAT / UPDATE_BURROW dispatch.
════════════════════════════════════════════════════════════════ */

/* ── EDIT WOMBAT MODAL ── */
function EditWombatModal({wombat,onClose,onSave}){
  const t=useTheme();
  const [form,setForm]=useState({
    name:wombat.name||'',
    sex:wombat.sex||'unknown',
    ageClass:wombat.ageClass||'adult',
    status:wombat.status||'',
    firstSeen:wombat.firstSeen||today(),
    notes:wombat.notes||'',
    locationLabel:wombat.locationLabel||'',
  });
  // Represent the existing lat/lng as a location object so the picker can show it
  const [location,setLocation]=useState(
    wombat.lat?{lat:wombat.lat,lng:wombat.lng,address:wombat.location}:null
  );
  const [showMapPicker,setShowMapPicker]=useState(false);
  const [showGeoSearch,setShowGeoSearch]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  return <ModalWrap title="Edit Wombat" onClose={onClose} saveLabel="Save Changes" onSave={()=>{
    if(!form.name.trim())return alert('Please enter a name.');
    if(!form.status)return alert('Please select a health status.');
    onSave({
      ...form,
      lat:location?.lat??wombat.lat,
      lng:location?.lng??wombat.lng,
      location:location?.locality||location?.address||wombat.location,
      locationLabel:form.locationLabel.trim()||null,
    });
  }}>
    <FormField label="Name" required><FInput value={form.name} onChange={v=>set('name',v)} placeholder="e.g. Walter"/></FormField>
    <FormField label="Sex">
      <ChipPicker value={form.sex} onChange={v=>set('sex',v)} options={[{value:'M',label:'Male'},{value:'F',label:'Female'},{value:'unknown',label:'Unknown'}]}/>
    </FormField>
    <FormField label="Age Class">
      <ChipPicker value={form.ageClass} onChange={v=>set('ageClass',v)} options={[{value:'joey',label:'Joey'},{value:'sub-adult',label:'Sub-adult'},{value:'adult',label:'Adult'}]}/>
    </FormField>
    <FormField label="Health Status" required>
      <ChipPicker value={form.status} onChange={v=>set('status',v)} options={[{value:'healthy',label:'Healthy'},{value:'under_treatment',label:'Treatment'}]}/>
    </FormField>
    <FormField label="First Seen Date"><FInput type="date" value={form.firstSeen} onChange={v=>set('firstSeen',v)}/></FormField>
    <FormField label="Location">
      {location
        ? <div style={{background:t.soft,borderRadius:12,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
            <div style={{flex:1,minWidth:0}}>
              {location.address&&<div style={{fontSize:13,fontWeight:600,color:t.ink,marginBottom:2}}>{location.address}</div>}
              {location.lat&&<div style={{fontSize:12,color:t.mid,fontFamily:'monospace'}}>{location.lat.toFixed(5)}, {location.lng.toFixed(5)}</div>}
            </div>
            <button onClick={()=>{setLocation(null);setShowGeoSearch(false);}} style={{fontSize:12,color:t.mid,background:'none',border:'none',fontWeight:600,cursor:'pointer',flexShrink:0}}>Clear</button>
          </div>
        : <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {showGeoSearch
              ? <GeoSearch onSelect={r=>{setLocation(r);setShowGeoSearch(false);}} onCancel={()=>setShowGeoSearch(false)}/>
              : <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <button onClick={()=>{if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(async pos=>{const lat=pos.coords.latitude,lng=pos.coords.longitude;const loc=await reverseGeocode(lat,lng);setLocation({lat,lng,address:loc||''});},()=>alert('Location unavailable.'));}} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:7,padding:'10px',borderRadius:12,background:t.soft,border:`1px solid ${t.div}`,cursor:'pointer'}}>
                    {Ico.location(t.f700,15)}<span style={{fontSize:12.5,fontWeight:600,color:t.ink}}>Current GPS</span>
                  </button>
                  <button onClick={()=>setShowMapPicker(true)} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:7,padding:'10px',borderRadius:12,background:t.soft,border:`1px solid ${t.div}`,cursor:'pointer'}}>
                    {Ico.map(t.f700,15)}<span style={{fontSize:12.5,fontWeight:600,color:t.ink}}>Map</span>
                  </button>
                  <button onClick={()=>setShowGeoSearch(true)} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:7,padding:'10px',borderRadius:12,background:t.soft,border:`1px solid ${t.div}`,cursor:'pointer',gridColumn:'1/-1'}}>
                    {Ico.search(t.f700,15)}<span style={{fontSize:12.5,fontWeight:600,color:t.ink}}>Address</span>
                  </button>
                </div>
            }
          </div>
      }
      {showMapPicker&&<MapPickerModal initialLat={location?.lat} initialLng={location?.lng} onClose={()=>setShowMapPicker(false)} onConfirm={async pos=>{setLocation(pos);setShowMapPicker(false);const loc=await reverseGeocode(pos.lat,pos.lng);if(loc)setLocation({...pos,address:loc});}}/>}
    </FormField>
    <FormField label="Location Nickname" hint="Optional friendly name shown instead of the GPS address (e.g. Jane's Place).">
      <FInput value={form.locationLabel} onChange={v=>set('locationLabel',v)} placeholder="e.g. Jane's Place"/>
    </FormField>
    <FormField label="Notes"><FTextarea value={form.notes} onChange={v=>set('notes',v)} placeholder="Field observations…"/></FormField>
  </ModalWrap>;
}

/* ── EDIT BURROW MODAL ── */
function EditBurrowModal({burrow,wombats=[],onClose,onSave}){
  const t=useTheme();
  const [form,setForm]=useState({
    name:burrow.name||'',
    status:burrow.status||'',
    lastChecked:burrow.lastChecked||today(),
    orientation:burrow.orientation||'',
    entranceHeightCm:burrow.entranceHeightCm||'',
    entranceWidthCm:burrow.entranceWidthCm||'',
    substrate:burrow.habitat?.substrate||'',
    vegetation:burrow.habitat?.vegetation||'',
    habitatNotes:burrow.habitat?.notes||'',
    trailCamera:burrow.habitat?.trailCamera||false,
    wombatIds:burrow.wombatIds||[],
  });
  const [location,setLocation]=useState(
    burrow.lat?{lat:burrow.lat,lng:burrow.lng,address:burrow.location}:null
  );
  const [showMapPicker,setShowMapPicker]=useState(false);
  const [showGeoSearch,setShowGeoSearch]=useState(false);
  const [showMore,setShowMore]=useState(false);
  const [wSearch,setWSearch]=useState('');
  const filteredW=wombats.filter(w=>w.name.toLowerCase().includes(wSearch.toLowerCase()));
  const toggleWombat=id=>setForm(f=>({...f,wombatIds:f.wombatIds.includes(id)?f.wombatIds.filter(x=>x!==id):[...f.wombatIds,id]}));
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  return <ModalWrap title="Edit Burrow" onClose={onClose} saveLabel="Save Changes" onSave={()=>{
    if(!form.name.trim())return alert('Please enter a name.');
    if(!form.status)return alert('Please select a status.');
    const{substrate,vegetation,habitatNotes,trailCamera,...rest}=form;
    onSave({
      ...rest,
      entranceHeightCm:form.entranceHeightCm?Number(form.entranceHeightCm):undefined,
      entranceWidthCm:form.entranceWidthCm?Number(form.entranceWidthCm):undefined,
      lat:location?.lat??burrow.lat,
      lng:location?.lng??burrow.lng,
      location:location?.locality||location?.address||burrow.location,
      habitat:{substrate,vegetation,notes:habitatNotes,trailCamera},
    });
  }}>
    <FormField label="Name" required><FInput value={form.name} onChange={v=>set('name',v)} placeholder="e.g. Burrow Zeta"/></FormField>
    <FormField label="Status" required>
      <ChipPicker value={form.status} onChange={v=>set('status',v)} options={[{value:'active',label:'Active'},{value:'inactive',label:'Inactive'},{value:'damaged',label:'Damaged'}]}/>
    </FormField>
    <FormField label="Date Observed"><FInput type="date" value={form.lastChecked} onChange={v=>set('lastChecked',v)}/></FormField>
    <FormField label="Location">
      {location
        ? <div style={{background:t.soft,borderRadius:12,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
            <div style={{flex:1,minWidth:0}}>
              {location.address&&<div style={{fontSize:13,fontWeight:600,color:t.ink,marginBottom:2}}>{location.address}</div>}
              {location.lat&&<div style={{fontSize:12,color:t.mid,fontFamily:'monospace'}}>{location.lat.toFixed(5)}, {location.lng.toFixed(5)}</div>}
            </div>
            <button onClick={()=>{setLocation(null);setShowGeoSearch(false);}} style={{fontSize:12,color:t.mid,background:'none',border:'none',fontWeight:600,cursor:'pointer',flexShrink:0}}>Clear</button>
          </div>
        : <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {showGeoSearch
              ? <GeoSearch onSelect={r=>{setLocation(r);setShowGeoSearch(false);}} onCancel={()=>setShowGeoSearch(false)}/>
              : <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <button onClick={()=>{if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(async pos=>{const lat=pos.coords.latitude,lng=pos.coords.longitude;const loc=await reverseGeocode(lat,lng);setLocation({lat,lng,address:loc||''});},()=>alert('Location unavailable.'));}} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:7,padding:'10px',borderRadius:12,background:t.soft,border:`1px solid ${t.div}`,cursor:'pointer'}}>
                    {Ico.location(t.f700,15)}<span style={{fontSize:12.5,fontWeight:600,color:t.ink}}>Current GPS</span>
                  </button>
                  <button onClick={()=>setShowMapPicker(true)} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:7,padding:'10px',borderRadius:12,background:t.soft,border:`1px solid ${t.div}`,cursor:'pointer'}}>
                    {Ico.map(t.f700,15)}<span style={{fontSize:12.5,fontWeight:600,color:t.ink}}>Map</span>
                  </button>
                  <button onClick={()=>setShowGeoSearch(true)} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:7,padding:'10px',borderRadius:12,background:t.soft,border:`1px solid ${t.div}`,cursor:'pointer',gridColumn:'1/-1'}}>
                    {Ico.search(t.f700,15)}<span style={{fontSize:12.5,fontWeight:600,color:t.ink}}>Address</span>
                  </button>
                </div>
            }
          </div>
      }
      {showMapPicker&&<MapPickerModal initialLat={location?.lat} initialLng={location?.lng} onClose={()=>setShowMapPicker(false)} onConfirm={async pos=>{setLocation(pos);setShowMapPicker(false);const loc=await reverseGeocode(pos.lat,pos.lng);if(loc)setLocation({...pos,address:loc});}}/>}
    </FormField>
    <FormField label="Entrance Orientation">
      <CompassField value={form.orientation} onChange={v=>set('orientation',v)}/>
    </FormField>
    {/* More options toggle */}
    {(()=>{
      const extras=(form.wombatIds.length>0?1:0)+(form.entranceHeightCm||form.entranceWidthCm?1:0)+(form.substrate?1:0)+(form.vegetation?1:0)+(form.habitatNotes?1:0)+(form.trailCamera?1:0);
      return <button onClick={()=>setShowMore(s=>!s)} style={{display:'flex',alignItems:'center',gap:8,background:'none',border:'none',cursor:'pointer',padding:'2px 0',width:'100%'}}>
        <div style={{flex:1,height:1,background:t.div}}/>
        <span style={{fontSize:12,fontWeight:500,color:t.faint,whiteSpace:'nowrap',userSelect:'none'}}>
          {showMore?'Hide options':`More options${extras>0?` · ${extras} set`:''}`}
        </span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={t.faint} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transform:showMore?'rotate(180deg)':'none',transition:'transform 0.18s',flexShrink:0}}><path d="M6 9l6 6 6-6"/></svg>
        <div style={{flex:1,height:1,background:t.div}}/>
      </button>;
    })()}
    {showMore&&<>
      <FormField label="Associated Wombats">
        {form.wombatIds.length>0&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
          {form.wombatIds.map(id=>{const wx=wombats.find(x=>x.id===id);return wx?<button key={id} onClick={()=>toggleWombat(id)} style={{display:'inline-flex',alignItems:'center',gap:5,background:t.sage50,color:t.sage700,borderRadius:999,padding:'4px 10px',fontSize:12.5,fontWeight:600,border:'none',cursor:'pointer'}}>{wx.name} ×</button>:null;})}
        </div>}
        <div style={{border:`1px solid ${t.div}`,borderRadius:14,overflow:'hidden'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px'}}>
            {Ico.search(t.mid,14)}
            <input value={wSearch} onChange={e=>setWSearch(e.target.value)} placeholder="Search wombats…" style={{flex:1,fontSize:14,color:t.ink,background:'none',border:'none',outline:'none'}}/>
          </div>
          <div style={{maxHeight:160,overflowY:'auto',borderTop:`1px solid ${t.div}`}}>
            {filteredW.length===0&&<div style={{padding:'10px 14px',fontSize:13,color:t.mid,textAlign:'center'}}>No wombats found</div>}
            {filteredW.map(wx=>{const sel=form.wombatIds.includes(wx.id);return <button key={wx.id} onClick={()=>toggleWombat(wx.id)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 12px',background:sel?t.sage50:'transparent',border:'none',borderBottom:`1px solid ${t.div}`,textAlign:'left',cursor:'pointer'}}>
              <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${sel?t.sage700:t.faint}`,background:sel?t.sage700:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {sel&&Ico.check('#fff',10)}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:t.ink}}>{wx.name}</div>
                {wx.location&&<div style={{fontSize:11,color:t.mid}}>{wx.location}</div>}
              </div>
            </button>;})}
          </div>
        </div>
      </FormField>
      <FormField label="Entrance Size (cm)">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <FInput type="number" value={form.entranceHeightCm} onChange={v=>set('entranceHeightCm',v)} placeholder="Height"/>
          <FInput type="number" value={form.entranceWidthCm} onChange={v=>set('entranceWidthCm',v)} placeholder="Width"/>
        </div>
      </FormField>
      <FormField label="Substrate"><FInput value={form.substrate} onChange={v=>set('substrate',v)} placeholder="e.g. Sandy loam"/></FormField>
      <FormField label="Vegetation"><FInput value={form.vegetation} onChange={v=>set('vegetation',v)} placeholder="e.g. River she-oak woodland"/></FormField>
      <FormField label="Habitat Notes"><FTextarea value={form.habitatNotes} onChange={v=>set('habitatNotes',v)} placeholder="Notes on habitat…"/></FormField>
      <FormField label="Trail Camera">
        <ChipPicker value={form.trailCamera?'yes':'no'} onChange={v=>set('trailCamera',v==='yes')} options={[{value:'yes',label:'Yes'},{value:'no',label:'No'}]}/>
      </FormField>
    </>}
  </ModalWrap>;
}

/* ════════════════════════════════════════════════════════════════
   AUTH & UTILITY MODALS
   ConfirmModal: generic "are you sure?" bottom sheet for deletions.
   SignInModal:  email + password sign-in / sign-up (Supabase Auth).
════════════════════════════════════════════════════════════════ */

/* ── CONFIRM MODAL ── */
function ConfirmModal({title,message,confirmLabel='Delete',onConfirm,onCancel}){
  const t=useTheme();
  return ReactDOM.createPortal(
    <div style={{position:'fixed',inset:0,zIndex:2100,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.45)',padding:'24px 20px calc(72px + var(--sab) + 24px)'}}>
      <div style={{width:'100%',maxWidth:480,background:t.surface,borderRadius:24,padding:'24px 24px 28px',boxShadow:'0 8px 40px rgba(0,0,0,0.22)'}}>
        {/* Red warning icon */}
        <div style={{width:48,height:48,borderRadius:16,background:t.rose50,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
          {Ico.trash(t.rose700,22)}
        </div>
        <div style={{fontSize:17,fontWeight:800,color:t.ink,textAlign:'center',marginBottom:8}}>{title}</div>
        <div style={{fontSize:14,color:t.mid,textAlign:'center',lineHeight:1.55,marginBottom:24}}>{message}</div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onCancel} style={{flex:1,height:48,borderRadius:14,background:t.soft,color:t.ink,fontSize:15,fontWeight:600,border:'none'}}>Cancel</button>
          <button onClick={onConfirm} style={{flex:1,height:48,borderRadius:14,background:t.rose700,color:'#fff',fontSize:15,fontWeight:700,border:'none'}}>
            {Ico.trash('#fff',14)} {confirmLabel}
          </button>
        </div>
      </div>
    </div>,
    document.body
  );
}

/* ── SET PASSWORD MODAL (password-reset link flow) ── */
function SetPasswordModal({onDone}){
  const t=useTheme();

/* ── SIGN IN MODAL ── */
function SignInModal({onClose}){
  const t=useTheme();
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [forgotMode,setForgotMode]=useState(false);
  const [resetSent,setResetSent]=useState(false);

  const submit=async e=>{
    e&&e.preventDefault();setErr('');setLoading(true);
    try{
      const{error}=await supa.auth.signInWithPassword({email,password:pw});
      if(error)throw error;
      onClose&&onClose();
    }catch(e){setErr(e.message||'Incorrect email or password.');}
    finally{setLoading(false);}
  };

  const sendReset=async e=>{
    e&&e.preventDefault();setErr('');setLoading(true);
    try{
      const redirectTo=window.location.href.split('?')[0].split('#')[0];
      const{error}=await supa.auth.resetPasswordForEmail(email,{redirectTo});
      if(error)throw error;
      setResetSent(true);
    }catch(e){setErr(e.message||'Could not send reset email.');}
    finally{setLoading(false);}
  };

  const inp={background:t.soft,color:t.ink,borderRadius:12,padding:'13px 14px',fontSize:16,width:'100%',border:`1.5px solid ${t.div}`,marginBottom:10,display:'block'};
  const isWall=!onClose;

  const card={background:t.surface,borderRadius:24,padding:'28px 20px',width:'100%',maxWidth:380,boxShadow:t.shadow};

  return(
    <div style={overlay}>
      {isWall&&<div style={{marginBottom:32,textAlign:'center'}}>
