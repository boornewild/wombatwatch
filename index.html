*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#fff;font-family:-apple-system,"SF Pro Text","Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased;}

.app{width:100%;max-width:480px;height:100%;height:100svh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
/* Tab bar: fixed to the true screen bottom so it's never left floating in PWA standalone mode.
   left/right math centres it on desktop (>480px) and makes it full-width on mobile. */
.tabbar{position:fixed;bottom:0;z-index:800;
  left:max(0px,calc(50vw - 240px));right:max(0px,calc(50vw - 240px));}
/* Extend the tab bar background below the home indicator so no white gap shows in PWA mode */
.tabbar::after{content:'';position:absolute;top:100%;left:0;right:0;height:120px;background:var(--tabbar);}
/* Scrollable content area — sits above the tab bar, never behind it */
.content-area{flex:1;position:relative;overflow:hidden;min-height:0;}
.scroll{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.noscroll::-webkit-scrollbar{display:none;}.noscroll{-ms-overflow-style:none;scrollbar-width:none;}

input,textarea,select{font-family:inherit;outline:none;background:none;border:none;font-size:16px;}

button{cursor:pointer;font-family:inherit;border:none;background:none;padding:0;}

<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ════════════════════════════════════════════════════════════════
   WOMBATWATCH — ARCHITECTURE OVERVIEW
   ────────────────────────────────────────────────────────────────
   Single-file React 18 PWA. No build step required for the source
   (WombatWatch.html uses @babel/standalone at runtime). Run
   `node build.mjs` to compile + minify into index.html for production.

   DATA FLOW
     load() → useReducer(reducer, ...) → dispatch(action)
                                        → reducer mutates + saves
                                        → save(key, value)
                                        → localStorage

   STATE  All app state lives in one `data` object:
     data.wombats       Wombat[]
     data.burrows       Burrow[]
     data.treatments    Treatment[]
     data.sightings     Sighting[]
     data.burrowLogs    BurrowLog[]
     data.wombatPhotos  Photo[]
     data.burrowPhotos  Photo[]

   SCREENS  screen state drives top-level render:
     'dashboard' | 'map' | 'wombats' | 'wombat-profile' |
     'burrows'   | 'burrow-profile'

   MODALS  Layered above screens via modal state string:
     'profile' | 'edit-profile' | 'faq' | 'export' | 'csv-import' |
     'fab' | 'add-wombat' | 'add-burrow' | 'add-sighting'

   THEMING  ThemeCtx provides the active token set (T.L / T.D).
     CSS custom properties mirror these for non-JS contexts.

   OFFLINE  sw.js caches the app shell and map tiles.
     Tiles can be pre-fetched via the map page download button,
     which writes directly to the 'wombatwatch-tiles-v2' cache.

   SYNC  _sync flag on records marks unsynced changes for a future
     backend. Not currently wired to any remote endpoint.
════════════════════════════════════════════════════════════════ */

/* ════════════════════════════════════════════════════════════════
   DOMAIN CONSTANTS
   Single source of truth for all magic strings used across data,
   UI, CSV import normalisation, and filter logic.
════════════════════════════════════════════════════════════════ */

// Wombat health statuses
const WS={
  HEALTHY:         'healthy',
  UNDER_TREATMENT: 'under_treatment',
  MANGE:           'mange',
};

// Burrow condition statuses
const BS={
  ACTIVE:   'active',
  INACTIVE: 'inactive',
  DAMAGED:  'damaged',
};

// Treatment delivery methods
const METHOD={
  BURROW_FLAP: 'burrow_flap',  // Cydectin-soaked flap placed at burrow entrance
  DIRECT_POLE: 'direct_pole',  // Cydectin applied directly with pole applicator
  OBSERVATION: 'observation',  // No treatment — record-only visit (see also: Sighting)
};

// Treatment products
const PRODUCT={
  CYDECTIN:    'cydectin',     // Pour-on moxidectin — primary mange treatment
  BRAVECTO:    'bravecto',     // Fluralaner tablet — alternative treatment
  OBSERVATION: 'observation',  // Not a product; used when method = OBSERVATION
};

// Mange severity body regions (severity score 1–5 per region)
const BODY_PARTS=['head','neck','shoulders','back','rump','legs','tail'];

/* ════════════════════════════════════════════════════════════════
   DESIGN TOKENS
   Mirrors the CSS custom properties defined in <style>. T.L = light,
   T.D = dark. useTheme() returns the active set.
════════════════════════════════════════════════════════════════ */
const T={
  L:{bg:'#F7F5EF',surface:'#fff',soft:'#F2EFE7',div:'rgba(28,48,32,0.08)',
     f900:'#1F3A2A',f800:'#27482F',f700:'#2E5536',f600:'#3A6A42',f500:'#4A7C52',f300:'#A7C0A2',
     ink:'#1B2A1F',mid:'#4A5C4F',softInk:'#7A897E',faint:'#A9B2AB',
     lav50:'#F2EEFB',lav100:'#E6DEF7',lav500:'#7A6AB8',
     sage50:'#E8EFE6',sage700:'#3D6B3F',amb50:'#FBECCF',amb700:'#A26B1E',

     shadowHdr:'0 6px 18px rgba(31,58,42,0.12)',tabbar:'#fff',tabborder:'rgba(28,48,32,0.08)'},

     f900:'#0F1E15',f800:'#152A1E',f700:'#5A9E68',f600:'#2A4C35',f500:'#4A7C52',f300:'#6A8C6E',
     ink:'#EFEFE8',mid:'#A8B0A9',softInk:'#79827B',faint:'#4A524C',
     lav50:'#2B2636',lav100:'#342D46',lav500:'#A196D6',

/* ════════════════════════════════════════════════════════════════
   UTILITIES & HELPERS
════════════════════════════════════════════════════════════════ */
const uid=()=>{
  if(typeof crypto!=='undefined'&&crypto.randomUUID)return crypto.randomUUID();
  // Fallback for older browsers
  return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});
};
const fmtDate=s=>{if(!s)return'—';const d=new Date(s);return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;};
const timeAgo=s=>{if(!s)return'';const h=Math.floor((Date.now()-new Date(s))/36e5);if(h<1)return'Just now';if(h<24)return`${h}h ago`;const d=Math.floor(h/24);return d===1?'Yesterday':`${d}d ago`;};
const today=()=>new Date().toISOString().slice(0,10);
const statusTone=s=>({healthy:'sage',under_treatment:'amber',mange:'rose'}[s]||'pearl');
const statusLabel=s=>({healthy:'Healthy',under_treatment:'Under Treatment',mange:'Mange'}[s]||s);
const burrowTone=s=>({active:'sage',inactive:'amber',damaged:'rose'}[s]||'pearl');
const burrowStatusLabel=s=>({active:'Active',inactive:'Inactive',damaged:'Damaged'}[s]||(s?s.charAt(0).toUpperCase()+s.slice(1):s));
const nextWombatCode=wombats=>{const nums=wombats.map(w=>parseInt((w.code||'').slice(1)||'0')).filter(n=>n>0);const n=nums.length?Math.max(...nums)+1:1;return'W'+String(n).padStart(4,'0');};
const nextBurrowCode=burrows=>{const nums=burrows.map(b=>parseInt((b.code||'').slice(1)||'0')).filter(n=>n>0);const n=nums.length?Math.max(...nums)+1:1;return'B'+String(n).padStart(4,'0');};
// After a full sync, detect duplicate display codes (can happen when two volunteers both
// add records while offline and each gets auto-assigned the same W/B number).
// The earliest-created record keeps its code; later arrivals get the next available number.
// Returns {records, changed} where changed = only the renumbered ones (for Supabase patching).
const deduplicateCodes=(records,prefix)=>{
  const seen=new Set();const changed=[];
  const sorted=[...records].sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));
  const nums=sorted.map(r=>parseInt((r.code||'').slice(1)||'0')).filter(n=>n>0);
  let next=(nums.length?Math.max(...nums):0)+1;
  const out=sorted.map(r=>{
    const c=r.code||'';
    if(c&&!seen.has(c)){seen.add(c);return r;}
    const newCode=prefix+String(next++).padStart(4,'0');
    seen.add(newCode);
    const updated={...r,code:newCode};changed.push(updated);return updated;
  });
  return{records:out,changed};
};
/* CSV helpers */
const toCSV=(headers,rows)=>{const esc=v=>{if(v==null)return'';const s=String(v);return(s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s.replace(/"/g,'""')}"`:`${s}`;};return[headers,...rows].map(r=>r.map(esc).join(',')).join('\r\n');};
const dlCSV=(filename,headers,rows)=>{const blob=new Blob(['\uFEFF'+toCSV(headers,rows)],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);};
const parseCSV=text=>{
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  if(!lines.length)return{headers:[],rows:[]};
  const splitLine=line=>{const cols=[];let cur='';let inQ=false;for(let i=0;i<line.length;i++){if(line[i]==='"')inQ=!inQ;else if(line[i]===','&&!inQ){cols.push(cur);cur='';}else cur+=line[i];}cols.push(cur);return cols.map(c=>c.replace(/^"|"$/g,'').replace(/""/g,'"').trim());};
  const headers=splitLine(lines[0]);
  const rows=lines.slice(1).map(splitLine).filter(r=>r.some(c=>c));
  return{headers,rows};
};

/* ════════════════════════════════════════════════════════════════
   DATA SCHEMAS
   All entities stored in localStorage and manipulated by the reducer.
   Fields marked † are computed/derived and not persisted.

   Wombat {
     id          string      — uid(), e.g. 'w1'
     name        string      — common name given by rangers
     sex         'M'|'F'|'unknown'
     ageClass    'joey'|'sub-adult'|'adult'|'senior'
     status      WS.*        — current health status
     severity    {[BODY_PARTS[n]]: 1–5}  — current mange severity map
                             NOTE: distinct from Treatment.regions, which
                             records severity *at time of treatment*
     burrowIds   string[]    — associated burrow IDs (bidirectional with Burrow.wombatIds)
     firstSeen   string      — ISO date 'YYYY-MM-DD'
     location    string      — human-readable place name
     lat         number|null — WGS84 decimal degrees
     lng         number|null — WGS84 decimal degrees
     notes       string
     code        string      — auto-generated field (W0001, W0002…); reserved for
                              future use / data export; not currently displayed in UI
     _sync       boolean     — true = pending sync to remote backend
   }

   Burrow {
     id          string      — uid(), e.g. 'b1'
     name        string
     status      BS.*        — current condition
     location    string      — human-readable place name
     lat         number|null
     lng         number|null
     habitat     { substrate: string, vegetation: string, notes: string }
     wombatIds   string[]    — associated wombat IDs (bidirectional with Wombat.burrowIds)
     lastChecked string      — ISO date; updated automatically by ADD_BURROW_LOG
     nextCheck   string      — ISO date; set manually or on log entry
     code        string      — auto-generated (B0001, B0002…); reserved / not displayed
     _sync       boolean
   }

   Treatment {
     id          string
     wombatId    string
     at          string      — ISO date 'YYYY-MM-DD'
     by          string      — volunteer name (also cached to SK.userName)
     product     PRODUCT.*
     dose        string      — e.g. '1.5ml'
     method      METHOD.*
     severity    number      — overall severity score 1–5 at time of treatment
     regions     {[BODY_PARTS[n]]: 1–5}  — per-region severity at time of treatment
                             NOTE: wombat.severity is updated separately to reflect
                             current status; regions here is the historical record
     note        string
     _sync       boolean
   }

   Sighting {
     id          string
     wombatId    string
     at          string      — ISO datetime
     lat         number|null
     lng         number|null
     note        string
     _sync       boolean
   }

   BurrowLog {
     id          string
     burrowId    string
     at          string      — ISO date
     status      BS.*        — condition observed on this visit
     condition   string      — free-text description
     occupants   number      — estimated wombats using burrow
     note        string
     by          string      — volunteer name
     _sync       boolean
   }

   Photo {
     id          string
     wombatId?   string      — set for wombat photos
     burrowId?   string      — set for burrow photos
     isProfile   boolean     — true = shown as the entity's primary photo
     dataUrl     string      — base64 data URI
     at          string      — ISO datetime of capture
   }
════════════════════════════════════════════════════════════════ */

/* ── Streak helpers ──────────────────────────────────────────────
   A "week key" is YYYY-WNN. Any logging activity within a calendar
   week counts. Missing a full week resets the streak to 1.        */
const STREAK_KEY='ww_streak';
function getWeekKey(date=new Date()){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));
  const y=d.getUTCFullYear();
  const wk=Math.ceil(((d-new Date(Date.UTC(y,0,1)))/86400000+1)/7);
  return`${y}-W${String(wk).padStart(2,'0')}`;
}
function loadStreak(){try{return JSON.parse(localStorage.getItem(STREAK_KEY))||{count:0,weekKey:''};}catch{return{count:0,weekKey:''};}}
function touchStreak(){
  const now=getWeekKey();
  const s=loadStreak();
  if(s.weekKey===now)return s.count; // already active this week
  // Work out how many weeks gap between last active week and now
  const prev=s.weekKey?new Date(s.weekKey.replace(/W(\d+)/,(_,w)=>`01-${String(w).padStart(2,'0')}`)):null;
  const gap=prev?Math.round((new Date(now.replace(/W(\d+)/,(_,w)=>`01-${String(w).padStart(2,'0')}`))-prev)/604800000):99;
  const count=gap<=1&&s.count>0?s.count+1:1;
  try{localStorage.setItem(STREAK_KEY,JSON.stringify({count,weekKey:now}));}catch{}
  return count;
}

/* Compress an image File to a JPEG dataUrl ≤ maxPx wide/tall at the given quality */
function compressImage(file,maxPx=1200,quality=0.75){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let{width:w,height:h}=img;
        if(w>maxPx||h>maxPx){const s=maxPx/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── 401 / auth-error hook ─────────────────────────────────────
// Set by the App component so global Supabase helpers can trigger a sign-out
// when they receive an auth error (expired token, revoked account, etc.)
let onAuthError=null;
function checkAuthError(error){
  if(!error)return;
  const msg=(error.message||'').toLowerCase();
  const isAuth=error.status===401||error.code==='PGRST301'||msg.includes('jwt')||msg.includes('not authenticated');
  if(isAuth&&onAuthError)onAuthError();
}

// ── Remote ops ───────────────────────────────────────────────
async function supaUpsert(table,row){
  try{
    const{error}=await supa.from(table).upsert(row,{onConflict:'id'});
    if(error){console.warn('[Supa] upsert',table,error.message);checkAuthError(error);}
    return!error;
  }catch(e){console.warn('[Supa] upsert exception',table,e);return false;}
}
async function supaDelete(table,id){
  try{
    const{error}=await supa.from(table).delete().eq('id',id);
    if(error){console.warn('[Supa] delete',table,error.message);checkAuthError(error);}
    return!error;
  }catch(e){return false;}
}

// ── Supabase Storage — photo upload ──────────────────────────
// Uploads a base64 dataUrl to the 'photos' storage bucket.
// Returns the public URL on success, or null if upload fails.
// After a successful upload the local record is patched to use the
// URL so subsequent syncs don't re-upload the same image.
async function uploadPhotoToStorage(dataUrl,photoId,localStorageKey){
  try{
    const res=await fetch(dataUrl);
    const blob=await res.blob();
    const path=`${photoId}.jpg`;
    const{error}=await supa.storage.from('photos').upload(path,blob,{upsert:true,contentType:'image/jpeg'});
    if(error){console.warn('[Storage]',error.message);return null;}
    const{data:{publicUrl}}=supa.storage.from('photos').getPublicUrl(path);
    // Patch localStorage so this photo is stored as a URL (not base64) going forward
    if(localStorageKey){
      try{
        const list=JSON.parse(localStorage.getItem(localStorageKey)||'[]');
        const updated=list.map(p=>p.id===photoId?{...p,dataUrl:publicUrl}:p);
        localStorage.setItem(localStorageKey,JSON.stringify(updated));
      }catch{}
    }
    return publicUrl;
  }catch(e){console.warn('[Storage] exception',e);return null;}
}

// Resolves the data_url for a photo before writing to Supabase:
// if it's base64, uploads to Storage and returns the URL; otherwise passes through.
async function resolvePhotoUrl(dataUrl,photoId,localKey){
  if(!dataUrl||!dataUrl.startsWith('data:'))return dataUrl;
  const url=await uploadPhotoToStorage(dataUrl,photoId,localKey);
  return url||dataUrl; // fall back to base64 if storage fails (still functional, just big)
}

// ── Offline queue ─────────────────────────────────────────────
const SQ_KEY='ww_sync_queue';
const SQ_MAX_RETRIES=5; // drop an op after this many consecutive failures
function queueOp(op){try{const q=JSON.parse(localStorage.getItem(SQ_KEY)||'[]');q.push({...op,_retries:0});localStorage.setItem(SQ_KEY,JSON.stringify(q));}catch(e){}}
async function flushQueue(userId){
  try{
    const q=JSON.parse(localStorage.getItem(SQ_KEY)||'[]');
    if(!q.length)return;
    const remaining=[];
    for(const op of q){
      let ok=false;
      try{
        if(op.t==='upsert'){
          let row={...op.row,created_by:op.row.created_by||userId};
          // If the queued row still has base64 photo data, upload to Storage first
          if(row.data_url&&row.data_url.startsWith('data:')){
            const lk=op.table==='wombat_photos'?SK.wp:SK.bp;
            const url=await resolvePhotoUrl(row.data_url,row.id,lk);
            row={...row,data_url:url};
          }
          ok=await supaUpsert(op.table,row);
        }else if(op.t==='delete'){
          ok=await supaDelete(op.table,op.id);
        }
      }catch(e){}
      if(!ok){
        const retries=(op._retries||0)+1;
        if(retries>=SQ_MAX_RETRIES){
          console.warn('[Queue] Dropping op after',retries,'failures:',op.t,op.table||op.id);
        }else{
          remaining.push({...op,_retries:retries});
        }
      }
    }
    localStorage.setItem(SQ_KEY,JSON.stringify(remaining));
  }catch(e){}
}

// ── Sync single action → Supabase ─────────────────────────────
async function syncAction(action,userId){
  const fromLS=(k,id)=>{try{return(JSON.parse(localStorage.getItem(SK[k]))||[]).find(r=>r.id===id);}catch{return null;}};
  const push=async(table,row)=>{
    const r={...row,created_by:row.created_by||userId};
    if(!navigator.onLine){queueOp({t:'upsert',table,row:r});return;}
    const ok=await supaUpsert(table,r);
    if(!ok)queueOp({t:'upsert',table,row:r});
  };
  const del=async(table,id)=>{
    if(!navigator.onLine){queueOp({t:'delete',table,id});return;}
    const ok=await supaDelete(table,id);
    if(!ok)queueOp({t:'delete',table,id});
  };
  try{
    switch(action.type){
      case'ADD_WOMBAT':     await push('wombats',    wombatToDb(action.wombat,userId)); break;
      case'UPDATE_WOMBAT':  {const w=fromLS('w',action.id);if(w)await push('wombats',wombatToDb(w,userId));break;}
      case'IMPORT_WOMBATS': for(const w of action.wombats)await push('wombats',wombatToDb(w,userId)); break;
      case'DELETE_WOMBAT':  await del('wombats',action.id); break; // ON DELETE CASCADE handles child records
      case'ADD_BURROW':     await push('burrows',    burrowToDb(action.burrow,userId)); break;
      case'UPDATE_BURROW':  {const b=fromLS('b',action.id);if(b)await push('burrows',burrowToDb(b,userId));break;}
      case'IMPORT_BURROWS': for(const b of action.burrows)await push('burrows',burrowToDb(b,userId)); break;
      case'DELETE_BURROW':  await del('burrows',action.id); break; // ON DELETE CASCADE handles child records
      case'ADD_TREATMENT':  await push('treatments', treatmentToDb(action.treatment,userId)); break;
      case'DELETE_TREATMENT': await del('treatments',action.treatmentId); break;
      case'ADD_SIGHTING':   await push('sightings',  sightingToDb(action.sighting,userId)); break;
      case'ADD_BURROW_LOG': {
        await push('burrow_logs',burrowLogToDb(action.log,userId));
        const b=fromLS('b',action.log.burrowId);if(b)await push('burrows',burrowToDb(b,userId));
        break;
      }
      case'DELETE_BURROW_LOG': await del('burrow_logs',action.logId); break;
      case'ADD_WOMBAT_PHOTO': {
        // Upload photo data to Supabase Storage; store URL in DB (not base64)
        const wp=action.photo;
        const url=navigator.onLine?await resolvePhotoUrl(wp.dataUrl,wp.id,SK.wp):wp.dataUrl;
        await push('wombat_photos',wombatPhotoToDb({...wp,dataUrl:url},userId));
        break;
      }
      case'DELETE_WOMBAT_PHOTO': {
        await del('wombat_photos',action.photoId);
        // Also remove from Storage (best-effort)
        supa.storage.from('photos').remove([`${action.photoId}.jpg`]).catch(()=>{});
        break;
      }
      case'SET_PROFILE_PHOTO': {
        const ps=(JSON.parse(localStorage.getItem(SK.wp)||'[]')).filter(p=>p.wombatId===action.wombatId);
        for(const p of ps){
          const url=navigator.onLine?await resolvePhotoUrl(p.dataUrl,p.id,SK.wp):p.dataUrl;
          await push('wombat_photos',wombatPhotoToDb({...p,dataUrl:url},userId));
        }
        break;
      }
      case'ADD_BURROW_PHOTO': {
        const bp=action.photo;
        const url=navigator.onLine?await resolvePhotoUrl(bp.dataUrl,bp.id,SK.bp):bp.dataUrl;
        await push('burrow_photos',burrowPhotoToDb({...bp,dataUrl:url},userId));
        break;
      }
      case'DELETE_BURROW_PHOTO': {
        await del('burrow_photos',action.photoId);
        supa.storage.from('photos').remove([`${action.photoId}.jpg`]).catch(()=>{});
        break;
      }
      case'SET_BURROW_PROFILE_PHOTO': {
        const ps=(JSON.parse(localStorage.getItem(SK.bp)||'[]')).filter(p=>p.burrowId===action.burrowId);
        for(const p of ps){
          const url=navigator.onLine?await resolvePhotoUrl(p.dataUrl,p.id,SK.bp):p.dataUrl;
          await push('burrow_photos',burrowPhotoToDb({...p,dataUrl:url},userId));
        }
        break;
      }
      case'LINK_WOMBAT_BURROW': {
        const w=fromLS('w',action.wombatId);if(w)await push('wombats',wombatToDb(w,userId));
        const b=fromLS('b',action.burrowId);if(b)await push('burrows',burrowToDb(b,userId));
        break;
      }
      default:break;
    }
  }catch(e){console.warn('[Supa] syncAction error',e);}
}

// ── Full pull on sign-in ───────────────────────────────────────
// Returns merged state object, or null for a new user (no remote data).
// Uses Promise.allSettled so a single failing table (permissions error,
// timeout, etc.) doesn't abort the entire sync — the app just keeps
// whatever local data it had for that table.
async function supaFullSync(){
  const results=await Promise.allSettled([
    supa.from('wombats').select('*'),
    supa.from('burrows').select('*'),
    supa.from('treatments').select('*'),
    supa.from('sightings').select('*'),
    supa.from('burrow_logs').select('*'),
    supa.from('wombat_photos').select('*'),
    supa.from('burrow_photos').select('*'),
  ]);
  const val=(r,key)=>{
    if(r.status==='rejected'){console.warn('[Supa] sync failed for',key,r.reason);return null;}
    if(r.value?.error){console.warn('[Supa] sync error for',key,r.value.error.message);return null;}
    return r.value?.data||null;
  };
  const[w,b,t,s,bl,wp,bp]=[val(results[0],'wombats'),val(results[1],'burrows'),val(results[2],'treatments'),val(results[3],'sightings'),val(results[4],'burrow_logs'),val(results[5],'wombat_photos'),val(results[6],'burrow_photos')];
  if(!(w?.length||0)&&!(b?.length||0))return null; // new user
  const merge=(remote,localKey,conv)=>{
    const map=Object.fromEntries((remote||[]).map(r=>[r.id,conv(r)]));
    // Layer in any local unsynced records (offline edits win)
    (JSON.parse(localStorage.getItem(SK[localKey])||'[]')).filter(r=>!r._sync).forEach(r=>{map[r.id]=r;});
    return Object.values(map);
  };
  return{
    wombats:     merge(w, 'w',  dbToWombat),
    burrows:     merge(b, 'b',  dbToBurrow),
    treatments:  merge(t, 't',  dbToTreatment),
    sightings:   merge(s, 's',  dbToSighting),
    burrowLogs:  merge(bl,'bl', dbToBurrowLog),
    wombatPhotos:merge(wp,'wp', dbToWombatPhoto),
    burrowPhotos:merge(bp,'bp', dbToBurrowPhoto),
  };
}

function SwipeToDelete({children,onDelete}){
  const t=useTheme();
  const [offset,setOffset]=useState(0);
  const [swiping,setSwiping]=useState(false);
  const startX=useRef(0);
  const startY=useRef(0);
  const startOff=useRef(0);
  const gesture=useRef(null); // null | 'h' | 'v'
  const REVEAL=80;
  const onTouchStart=e=>{
    startX.current=e.touches[0].clientX;
    startY.current=e.touches[0].clientY;
    startOff.current=offset;
    gesture.current=null;
  };
  const onTouchMove=e=>{
    const dx=e.touches[0].clientX-startX.current;
    const dy=e.touches[0].clientY-startY.current;
    if(!gesture.current&&(Math.abs(dx)>5||Math.abs(dy)>5)){
      gesture.current=Math.abs(dx)>Math.abs(dy)?'h':'v';
      if(gesture.current==='h')setSwiping(true);
    }
    if(gesture.current==='h') setOffset(Math.min(0,Math.max(-REVEAL,startOff.current+dx)));
  };
  const onTouchEnd=()=>{
    setSwiping(false);
    if(gesture.current==='h') setOffset(o=>o<-REVEAL/2?-REVEAL:0);
    gesture.current=null;
  };
  const handleDelete=()=>{setOffset(0);onDelete();};
  const handleTap=()=>{if(offset!==0)setOffset(0);};
  return <div style={{overflow:'hidden',borderRadius:16}}>
    <div
      style={{display:'flex',alignItems:'stretch',transform:`translateX(${offset}px)`,transition:swiping?'none':'transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)',touchAction:'pan-y'}}
      onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
      onClick={handleTap}
    >
      <div style={{flex:'1 0 100%',minWidth:0}}>
        {children}
      </div>
      <div style={{width:REVEAL,flexShrink:0,background:t.rose700,borderRadius:'0 16px 16px 0',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <button onClick={handleDelete} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,background:'none',border:'none',cursor:'pointer',padding:8}}>
          {Ico.trash('#fff',18)}
          <span style={{fontSize:10.5,fontWeight:700,color:'#fff',letterSpacing:0.3}}>Delete</span>
        </button>
      </div>
    </div>
  </div>;
}

// Weather: Open-Meteo (no API key, Access-Control-Allow-Origin:* — works from file://)
// River:   BOM KISTERS via allorigins CORS proxy (file:// sends null origin, BOM rejects it)
const WX_CACHE_KEY='ww_weather_cache';
function WeatherWidget(){
  const t=useTheme();
  // Initialise from cache so offline visits show last known data immediately
  const [wx,setWx]=useState(()=>{
    try{const c=JSON.parse(localStorage.getItem(WX_CACHE_KEY));return c?.wx??null;}catch{return null;}
  });
  const [river,setRiver]=useState(()=>{
    try{const c=JSON.parse(localStorage.getItem(WX_CACHE_KEY));return c?.river??null;}catch{return null;}
  });
  const [cachedAt,setCachedAt]=useState(()=>{
    try{const c=JSON.parse(localStorage.getItem(WX_CACHE_KEY));return c?.at??null;}catch{return null;}
  });
  const [fromCache,setFromCache]=useState(()=>!!localStorage.getItem(WX_CACHE_KEY));

  // WMO weather code → human label + icon key
  const wmoInfo=(code)=>{
    if(code==null) return {label:'—',icon:'cloud'};
    if(code===0)   return {label:'Clear',icon:'sun'};
    if(code<=2)    return {label:'Partly Cloudy',icon:'cloud'};
    if(code<=3)    return {label:'Overcast',icon:'cloud'};
    if(code<=48)   return {label:'Foggy',icon:'cloud'};
    if(code<=57)   return {label:'Drizzle',icon:'rain'};
    if(code<=67)   return {label:'Rainy',icon:'rain'};
    if(code<=77)   return {label:'Showers',icon:'rain'};
    if(code<=82)   return {label:'Showers',icon:'rain'};
    if(code<=99)   return {label:'Storms',icon:'rain'};
    return {label:'—',icon:'cloud'};
  };

  const wxIco=(icon,c,s=32)=>{
    if(icon==='sun')  return Ico.sun(c,s);
    if(icon==='rain') return Ico.cloudRain(c,s);
    return Ico.cloud(c,s);
  };

  useEffect(()=>{
    let dead=false;
    let freshWx=null;
    let freshRiver=null;

    const saveCache=(wxVal,rvVal)=>{
      try{
        const at=new Date().toISOString();
        localStorage.setItem(WX_CACHE_KEY,JSON.stringify({wx:wxVal,river:rvVal,at}));
        if(!dead){setCachedAt(at);setFromCache(false);}
      }catch{}
    };

    // ── Weather: Open-Meteo (St Albans NSW -33.13, 150.98) ───────────
    const doWeather=async()=>{
      try{
        const url='https://api.open-meteo.com/v1/forecast'
          +'?latitude=-33.13&longitude=150.98'
          +'&current=temperature_2m,weather_code'
          +'&daily=temperature_2m_max,temperature_2m_min'
          +'&timezone=Australia%2FSydney&forecast_days=1';
        const r=await fetch(url);
        if(!r.ok) throw 0;
        const d=await r.json();
        const curr=d.current;
        const daily=d.daily;
        const info=wmoInfo(curr?.weather_code);
        freshWx={
          temp: curr?.temperature_2m!=null?Math.round(curr.temperature_2m):null,
          hi:   daily?.temperature_2m_max?.[0]!=null?Math.round(daily.temperature_2m_max[0]):null,
          lo:   daily?.temperature_2m_min?.[0]!=null?Math.round(daily.temperature_2m_min[0]):null,
          cond: info.label,
          icon: info.icon,
        };
        if(!dead){setWx(freshWx);setFromCache(false);}
      }catch(e){ if(!dead&&!wx) setWx(false); }
    };

    // ── River height: BOM FWO JSON for St Albans at Espie St (061353) ──
    // Try direct fetch first (works from PWA/HTTPS context), then fall back
    // through two CORS proxies in case one is down or rate-limited.
    const doRiver=async()=>{
      const BOM_URL='https://www.bom.gov.au/fwo/IDN60233/IDN60233.061353.json';
      const attempts=[
        ()=>fetch(BOM_URL,{cache:'no-store'}),
        ()=>fetch('https://corsproxy.io/?'+encodeURIComponent(BOM_URL),{cache:'no-store'}),
        ()=>fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(BOM_URL)),
      ];
      for(const attempt of attempts){
        try{
          const r=await attempt();
          if(!r.ok) continue;
          const d=await r.json();
          const obs=d?.observations?.data;
          if(!Array.isArray(obs)||obs.length===0) continue;
          const entry=obs.find(o=>o.river_height!=null&&!isNaN(Number(o.river_height)));
          if(entry!=null){
            freshRiver=Number(entry.river_height);
            if(!dead){setRiver(freshRiver);setFromCache(false);}
            return;
          }
        }catch(e){}
      }
      if(!dead&&river==null) setRiver(false);
    };

    // Run both, then save cache once both settle
    Promise.allSettled([doWeather(),doRiver()]).then(()=>{
      if(!dead&&freshWx!=null) saveCache(freshWx,freshRiver);
    });

    return()=>{dead=true;};
  },[]);

  const tempStr=wx?.temp!=null?`${wx.temp}°`:'—';
  const hiStr=wx?.hi!=null?`${wx.hi}°`:'—';
  const loStr=wx?.lo!=null?`${wx.lo}°`:'—';
  const condStr=wx===false?'Unavailable':wx?.cond||'—';
  const rvStr=river!=null&&river!==false?`${Number(river).toFixed(2)}m`:'—';
  const cacheLabel=(()=>{
    if(!cachedAt) return null;
    const mins=Math.round((Date.now()-new Date(cachedAt))/60000);
    if(mins<2) return'Just now';
    if(mins<60) return`${mins}m ago`;
    const hrs=Math.floor(mins/60);
    if(hrs<24) return`${hrs}h ago`;
    return`${Math.floor(hrs/24)}d ago`;
  })();

  return <Card padding={20}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
      <div>
        <div style={{display:'flex',alignItems:'center',gap:4,fontSize:12.5,color:t.mid,fontWeight:500}}>{Ico.pin(t.mid,12)} Macdonald Valley{cacheLabel&&<span style={{marginLeft:6,fontSize:11,color:t.faint,fontWeight:400}}>{fromCache?'cached ':'updated '}{cacheLabel}</span>}</div>
        <div style={{display:'flex',alignItems:'baseline',gap:6,marginTop:6}}>
          <span style={{fontSize:30,fontWeight:700,color:t.ink,letterSpacing:-0.6,lineHeight:1}}>{tempStr}</span>
          {wx?.temp!=null&&<span style={{fontSize:13,color:t.mid}}>C</span>}
          <span style={{fontSize:14,color:t.mid,marginLeft:4}}>{condStr}</span>
        </div>
        <div style={{fontSize:11.5,color:t.softInk,marginTop:3}}>H: {hiStr}  L: {loStr}</div>
      </div>
      {wxIco(wx?.icon,t.mid,32)}
    </div>
    <div style={{marginTop:8,background:t.soft,borderRadius:10,padding:'8px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{display:'flex',alignItems:'center',gap:7,fontSize:12.5,color:t.mid,fontWeight:500}}>{Ico.wave(t.mid,14)} Macdonald River</div>
      <span style={{fontSize:13,fontWeight:700,color:t.ink}}>{rvStr}</span>
    </div>
  </Card>;
}

// Bounding box covering the Macdonald Valley / St Albans operational area
const OFFLINE_BBOX={n:-33.0,s:-33.35,w:150.75,e:151.1};
const OFFLINE_ZOOM_MIN=10, OFFLINE_ZOOM_MAX=15;
const TILE_CACHE_NAME='wombatwatch-tiles-v2'; // must match sw.js TILE_CACHE

function latToTY(lat,z){
  const r=lat*Math.PI/180;
  return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*(1<<z));
}
function lonToTX(lon,z){return Math.floor((lon+180)/360*(1<<z));}

function* genTiles(bbox,zMin,zMax){
  for(let z=zMin;z<=zMax;z++){
    const x0=lonToTX(bbox.w,z),x1=lonToTX(bbox.e,z);
    const y0=latToTY(bbox.n,z),y1=latToTY(bbox.s,z);
    for(let x=x0;x<=x1;x++) for(let y=y0;y<=y1;y++) yield{z,x,y};
  }
}

// Pre-compute tile list once (evaluated when script loads)
const OFFLINE_TILES=Object.freeze([...genTiles(OFFLINE_BBOX,OFFLINE_ZOOM_MIN,OFFLINE_ZOOM_MAX)]);
// Rough file size estimate: rural tiles average ~5 KB
const OFFLINE_SIZE_MB=(OFFLINE_TILES.length*5/1024).toFixed(0);

/* ── MAP ── */
function MapScreen({data,nav,onFAB,openProfile,theme,onAddAt}){
  const t=useTheme();
  const mapRef=useRef(null);
  const leafletRef=useRef(null);
  const markersRef=useRef([]);
  const userMarkerRef=useRef(null);
  const longPressMarkerRef=useRef(null);
  const [selected,setSelected]=useState(null);
  const [longPressMenu,setLongPressMenu]=useState(null);
  const dismissLongPress=()=>{
    if(longPressMarkerRef.current){longPressMarkerRef.current.remove();longPressMarkerRef.current=null;}
    setLongPressMenu(null);
  };
  const [wombatFilters,setWombatFilters]=useState(new Set());
  const [burrowFilters,setBurrowFilters]=useState(new Set());
  const [cameraFilter,setCameraFilter]=useState(false);
  const [searchQuery,setSearchQuery]=useState('');

  // ── Offline map state ─────────────────────────────────────────────
  const [dlState,setDlState]=useState('checking'); // checking|idle|downloading|done|unsupported
  const [dlProgress,setDlProgress]=useState({done:0,total:OFFLINE_TILES.length});
  const [showOffSheet,setShowOffSheet]=useState(false);
  const [offMeta,setOffMeta]=useState(null); // {savedAt}

  useEffect(()=>{
    if(!('caches' in window)){setDlState('unsupported');return;}
    caches.open(TILE_CACHE_NAME).then(async c=>{
      const keys=await c.keys();
      // If we have a meaningful number of tiles already cached, treat as done
      if(keys.length>=OFFLINE_TILES.length*0.9){
        setDlState('done');
        setOffMeta({savedAt:localStorage.getItem(SK.offlineSaved)||'previously'});
      } else {
        setDlState('idle');
      }
    }).catch(()=>setDlState('idle'));
  },[]);

  const startDownload=async()=>{
    if(!('caches' in window))return;
    setShowOffSheet(false);
    setDlState('downloading');
    setDlProgress({done:0,total:OFFLINE_TILES.length});
    try{
      const cache=await caches.open(TILE_CACHE_NAME);
      const tiles=OFFLINE_TILES;
      let done=0;
      const BATCH=6;
      for(let i=0;i<tiles.length;i+=BATCH){
        const batch=tiles.slice(i,i+BATCH);
        await Promise.allSettled(batch.map(async({z,x,y})=>{
          const url=`https://tile.openstreetmap.org/${z}/${x}/${y}.png`;
          try{
            const hit=await cache.match(url);
            if(!hit){
              const r=await fetch(url,{mode:'cors'});
              if(r.ok) await cache.put(url,r);
            }
          }catch(e){}
          done++;
          // Update progress every 20 tiles to avoid too many re-renders
          if(done%20===0||done===tiles.length) setDlProgress({done,total:tiles.length});
        }));
      }
      const savedAt=new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
      localStorage.setItem(SK.offlineSaved,savedAt);
      setOffMeta({savedAt});
      setDlState('done');
    }catch(e){
      console.error('[OfflineMap] download error',e);
      setDlState('idle');
    }
  };

  const removeDownload=async()=>{
    if(!('caches' in window))return;
    await caches.delete(TILE_CACHE_NAME);
    localStorage.removeItem(SK.offlineSaved);
    setOffMeta(null);
    setDlState('idle');
    setShowOffSheet(false);
  };

  const wColors={'healthy':'#4A7C52','under_treatment':'#D89039','mange':'#B95C4A'};
  const bColors={'active':'#4A7C52','inactive':'#D89039','damaged':'#B95C4A'};

  const flyToUser=()=>{
    if(!navigator.geolocation)return alert('Geolocation is not available on this device.');
    navigator.geolocation.getCurrentPosition(pos=>{
      const{latitude:lat,longitude:lng}=pos.coords;
      if(!leafletRef.current)return;
      leafletRef.current.flyTo([lat,lng],15,{duration:1.2});
      if(userMarkerRef.current)userMarkerRef.current.remove();
      const icon=L.divIcon({html:`<div style="width:16px;height:16px;background:#2196F3;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 10px rgba(33,150,243,0.55)"></div>`,className:'',iconSize:[16,16],iconAnchor:[8,8]});
      userMarkerRef.current=L.marker([lat,lng],{icon}).addTo(leafletRef.current);
    },()=>alert('Could not get your location. Please check permissions.'));
  };

  useEffect(()=>{
    if(!mapRef.current||leafletRef.current)return;
    // Macdonald Valley — centred to show Wisemans Ferry → Higher Macdonald
    const center=[-33.175,150.960];
    const map=L.map(mapRef.current,{zoomControl:false}).setView(center,11);
    leafletRef.current=map;
    const tileUrl=theme==='dark'
      ?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      :'https://tile.openstreetmap.org/{z}/{x}/{y}.png';
    L.tileLayer(tileUrl,{attribution:'© OpenStreetMap | © CartoDB',maxZoom:18}).addTo(map);
    // Long press detection
    let pressTimer=null;
    let hasMoved=false;
    const startPress=e=>{
      hasMoved=false;
      if(!e.latlng)return;
      const latlng=e.latlng;
      pressTimer=setTimeout(()=>{
        if(!hasMoved){
          if(longPressMarkerRef.current){longPressMarkerRef.current.remove();}
          const dotIcon=L.divIcon({html:`<div style="width:22px;height:22px;background:#2E5536;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 10px rgba(46,85,54,0.5)"></div>`,className:'',iconSize:[22,22],iconAnchor:[11,11]});
          longPressMarkerRef.current=L.marker([latlng.lat,latlng.lng],{icon:dotIcon,zIndexOffset:1000}).addTo(map);
          setLongPressMenu({lat:latlng.lat,lng:latlng.lng});
        }
      },600);
    };
    const cancelPress=()=>{clearTimeout(pressTimer);};
    const moveCancel=()=>{hasMoved=true;clearTimeout(pressTimer);};
    map.on('mousedown',startPress);
    map.on('touchstart',startPress);
    map.on('mouseup touchend',cancelPress);
    map.on('mousemove touchmove',moveCancel);
    return()=>{map.remove();leafletRef.current=null;};
  },[]);

  useEffect(()=>{
    const map=leafletRef.current;if(!map)return;
    markersRef.current.forEach(m=>m.remove());
    markersRef.current=[];
    const WPATH=`M7.49846 3.99915C6.57039 3.99915 5.68034 4.36782 5.02409 5.02406C4.36785 5.68031 3.99918 6.57036 3.99918 7.49843C3.99918 8.4265 4.36785 9.31656 5.02409 9.9728C5.68034 10.629 6.57039 10.9977 7.49846 10.9977C7.03179 11.5888 6.69149 12.2693 6.49867 12.9973C6.49867 14.4557 7.07801 15.8544 8.10925 16.8856C9.14049 17.9168 10.5392 18.4962 11.9975 18.4962C13.4559 18.4962 14.8546 17.9168 15.8858 16.8856C16.9171 15.8544 17.4964 14.4557 17.4964 12.9973C17.3036 12.2693 16.9633 11.5888 16.4966 10.9977C17.4247 10.9977 18.3148 10.629 18.971 9.9728C19.6272 9.31656 19.9959 8.4265 19.9959 7.49843C19.9959 6.57036 19.6272 5.68031 18.971 5.02406C18.3148 4.36782 17.4247 3.99915 16.4966 3.99915C15.8827 4.00962 15.2824 4.18142 14.7559 4.49731C14.2295 4.8132 13.7954 5.26204 13.4972 5.79878C12.8847 6.25503 12.374 6.83388 11.9975 7.49843C11.6211 6.83388 11.1104 6.25503 10.4978 5.79878C10.1997 5.26204 9.76562 4.8132 9.23915 4.49731C8.71267 4.18142 8.11235 4.00962 7.49846 3.99915Z`;
    const makeWombatIcon=(color)=>L.divIcon({
      className:'',
      html:`<div style="width:36px;height:36px;border-radius:50%;background:${color};border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${WPATH}"/></svg></div>`,
      iconSize:[36,36],iconAnchor:[18,18],
    });
    const CPATH='M9 7l1.5-3h3L15 7';
    const makeBurrowIcon=(color,hasCamera=false)=>L.divIcon({
      className:'',
      html:`<div style="position:relative;width:12px;height:12px;border-radius:3px;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.35)">${hasCamera?`<div style="position:absolute;top:-6px;right:-7px;width:12px;height:12px;border-radius:50%;background:#3B5B7A;border:1.5px solid #fff;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,0.35)"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2.5"/><circle cx="12" cy="13.5" r="3.5"/><path d="${CPATH}"/></svg></div>`:''}</div>`,
      iconSize:[12,12],iconAnchor:[6,6],
    });
    // Wombats (null = hidden, empty set = show all, non-empty = filtered)
    if(wombatFilters!==null){
      data.wombats.filter(w=>wombatFilters.size===0||wombatFilters.has(w.status)).forEach(w=>{
        if(!w.lat||!w.lng)return;
        const m=L.marker([w.lat,w.lng],{icon:makeWombatIcon(wColors[w.status]||'#4A7C52')}).addTo(map);
        m.on('click',()=>setSelected({...w,_type:'wombat'}));
        markersRef.current.push(m);
      });
    }
    // Burrows
    if(burrowFilters!==null){
      data.burrows
        .filter(b=>cameraFilter ? !!b.habitat?.trailCamera : (burrowFilters.size===0||burrowFilters.has(b.status)))
        .forEach(b=>{
          if(!b.lat||!b.lng)return;
          const hasCamera=!!b.habitat?.trailCamera;
          const m=L.marker([b.lat,b.lng],{icon:makeBurrowIcon(bColors[b.status]||'#4A7C52',hasCamera)}).addTo(map);
          m.on('click',()=>setSelected({...b,_type:'burrow'}));
          markersRef.current.push(m);
        });
    }
  },[data.wombats,data.burrows,wombatFilters,burrowFilters,cameraFilter]);

  const toggleWombat=k=>{
    if(k==='all'){setWombatFilters(prev=>prev===null?new Set():null);return;}
    setWombatFilters(prev=>{const n=new Set(prev||[]);n.has(k)?n.delete(k):n.add(k);return n.size===0?new Set():n;});
  };
  const toggleBurrow=k=>{
    if(k==='all'){setBurrowFilters(prev=>prev===null?new Set():null);return;}
    setBurrowFilters(prev=>{const n=new Set(prev||[]);n.has(k)?n.delete(k):n.add(k);return n.size===0?new Set():n;});
  };
  const wombatChips=[
    {k:'all',label:'All wombats',count:data.wombats.length,dot:'#4A7C52'},
    {k:'healthy',label:'Healthy',count:data.wombats.filter(w=>w.status==='healthy').length,dot:'#4A7C52'},
    {k:'under_treatment',label:'Treatment',count:data.wombats.filter(w=>w.status==='under_treatment').length,dot:'#D89039'},
    {k:'mange',label:'Mange',count:data.wombats.filter(w=>w.status==='mange').length,dot:'#B95C4A'},
  ];
  const burrowChips=[
    {k:'all',label:'All burrows',count:data.burrows.length,dot:'#4A7C52'},
    {k:'active',label:'Active',count:data.burrows.filter(b=>b.status==='active').length,dot:'#4A7C52'},
    {k:'inactive',label:'Inactive',count:data.burrows.filter(b=>b.status==='inactive').length,dot:'#D89039'},
    {k:'damaged',label:'Damaged',count:data.burrows.filter(b=>b.status==='damaged').length,dot:'#B95C4A'},
  ];
  const chipBtn=(label,count,dot,active,onClick)=>(
    <button onClick={onClick} style={{display:'inline-flex',alignItems:'center',gap:5,padding:'6px 11px',borderRadius:999,background:active?dot:t===T.D?'rgba(35,45,47,0.95)':'rgba(255,255,255,0.92)',color:active?'#fff':t.ink,fontSize:12,fontWeight:600,boxShadow:'0 2px 8px rgba(0,0,0,0.12)',border:t===T.D&&!active?`1px solid rgba(255,255,255,0.1)`:'none',whiteSpace:'nowrap',flexShrink:0}}>
      <div style={{width:7,height:7,borderRadius:4,background:active?'rgba(255,255,255,0.7)':dot,flexShrink:0}}/>
      {label} <span style={{opacity:0.72}}>· {count}</span>
    </button>
  );

  return <div style={{position:'absolute',inset:0,background:t.bg,overflow:'hidden'}}>
    <div ref={mapRef} style={{position:'absolute',inset:0}}/>
    <div style={{position:'absolute',top:0,left:0,right:0,zIndex:1000,padding:'var(--hdr-pt) 22px 12px',background:'linear-gradient(180deg,rgba(39,72,47,0.88) 0%,rgba(39,72,47,0.7) 60%,transparent 100%)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1,height:40,borderRadius:20,background:'rgba(255,255,255,0.96)',boxShadow:'0 2px 10px rgba(0,0,0,0.12)',display:'flex',alignItems:'center',padding:'0 14px',gap:10}}>
          {Ico.search(t.mid,15)}
          <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Search wombats, burrows…" style={{flex:1,fontSize:13.5,color:t.ink}}/>
        </div>
        <button onClick={openProfile} style={{width:36,height:36,borderRadius:18,background:'rgba(255,255,255,0.14)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,alignSelf:'flex-start'}}>
          {Ico.user('#fff',16)}
        </button>
      </div>
    </div>
    {/* Wombat filter row */}
    <div style={{position:'absolute',top:'calc(var(--hdr-pt) + 56px)',left:0,right:0,zIndex:1000,padding:'0 16px',display:'flex',gap:7,overflowX:'auto'}} className="noscroll">
      {wombatChips.map(c=>chipBtn(c.label,c.count,c.dot,c.k==='all'?(wombatFilters!==null&&wombatFilters.size===0):!!wombatFilters?.has(c.k),()=>toggleWombat(c.k)))}
    </div>
    {/* Burrow filter row */}
    <div style={{position:'absolute',top:'calc(var(--hdr-pt) + 94px)',left:0,right:0,zIndex:1000,padding:'0 16px',display:'flex',gap:7,overflowX:'auto'}} className="noscroll">
      {burrowChips.map(c=>chipBtn(c.label,c.count,c.dot,c.k==='all'?(burrowFilters!==null&&burrowFilters.size===0):!!burrowFilters?.has(c.k),()=>toggleBurrow(c.k)))}
      {/* Trail camera filter */}
      <button onClick={()=>setCameraFilter(v=>!v)} style={{display:'inline-flex',alignItems:'center',gap:5,padding:'6px 11px',borderRadius:999,background:cameraFilter?'#3B5B7A':t===T.D?'rgba(35,45,47,0.95)':'rgba(255,255,255,0.92)',color:cameraFilter?'#fff':t.ink,fontSize:12,fontWeight:600,boxShadow:'0 2px 8px rgba(0,0,0,0.12)',border:t===T.D&&!cameraFilter?`1px solid rgba(255,255,255,0.1)`:'none',whiteSpace:'nowrap',flexShrink:0}}>
        {Ico.camera(cameraFilter?'rgba(255,255,255,0.85)':'#3B5B7A',11)}
        Cameras · {data.burrows.filter(b=>b.habitat?.trailCamera).length}
      </button>
    </div>
    {/* Right-side controls: zoom + location + offline */}
    <div style={{position:'absolute',bottom:'calc(var(--sab) + 110px)',right:16,zIndex:1000,display:'flex',flexDirection:'column',gap:6}}>
      <button onClick={()=>leafletRef.current?.zoomIn()} style={{width:44,height:44,borderRadius:12,background:t.surface,boxShadow:t.shadow,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Ico.plus(t.ink,20)}</button>
      <button onClick={()=>leafletRef.current?.zoomOut()} style={{width:44,height:44,borderRadius:12,background:t.surface,boxShadow:t.shadow,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{Ico.minus(t.ink,20)}</button>
      <div style={{height:4}}/>
      <button onClick={flyToUser} style={{width:44,height:44,borderRadius:12,background:t.surface,boxShadow:'0 2px 10px rgba(0,0,0,0.18)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
        {Ico.crosshair(t.f700,20)}
      </button>
      <div style={{height:4}}/>
      {/* Offline maps button */}
      {dlState!=='unsupported'&&(
        <button onClick={()=>setShowOffSheet(s=>!s)} style={{width:44,height:44,borderRadius:12,background:dlState==='done'?t.sage50:t.surface,boxShadow:'0 2px 10px rgba(0,0,0,0.18)',border:dlState==='done'?`1.5px solid ${t.sage700}`:'none',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',gap:1}}>
          {dlState==='downloading'
            ? <><span style={{fontSize:8,fontWeight:700,color:t.f700,lineHeight:1}}>{Math.round(dlProgress.done/dlProgress.total*100)}%</span>{Ico.cloud(t.f700,16)}</>
            : dlState==='done'
              ? Ico.check(t.sage700,20)
              : Ico.cloudDl(t.f700,20)
          }
        </button>
      )}
    </div>
    {/* Offline map sheet */}
    {showOffSheet&&!longPressMenu&&<div style={{position:'absolute',left:20,right:20,zIndex:1001,bottom:'var(--screen-pb)'}}>
      <Card padding={16}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:15,color:t.ink}}>Offline maps</div>
          <button onClick={()=>setShowOffSheet(false)} style={{fontSize:20,color:t.mid,lineHeight:1,width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>
        {dlState==='idle'&&<>
          <div style={{fontSize:13,color:t.mid,lineHeight:1.5,marginBottom:12}}>Download the Macdonald Valley map for use without internet. Covers St Albans and surroundings at all zoom levels.</div>
          <div style={{display:'flex',gap:10,marginBottom:14,padding:'10px 12px',background:t.soft,borderRadius:10}}>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:17,fontWeight:700,color:t.ink}}>{OFFLINE_TILES.length.toLocaleString()}</div>
              <div style={{fontSize:11,color:t.mid,marginTop:2}}>tiles</div>
            </div>
            <div style={{width:1,background:t.div}}/>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:17,fontWeight:700,color:t.ink}}>~{OFFLINE_SIZE_MB} MB</div>
              <div style={{fontSize:11,color:t.mid,marginTop:2}}>estimated</div>
            </div>
            <div style={{width:1,background:t.div}}/>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:17,fontWeight:700,color:t.ink}}>z{OFFLINE_ZOOM_MIN}–{OFFLINE_ZOOM_MAX}</div>
              <div style={{fontSize:11,color:t.mid,marginTop:2}}>zoom levels</div>
            </div>
          </div>
          <button onClick={startDownload} style={{width:'100%',height:44,borderRadius:22,background:t.f700,color:'#fff',fontSize:14,fontWeight:700,border:'none',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            {Ico.download('#fff',16)} Download
          </button>
        </>}
        {dlState==='downloading'&&<>
          <div style={{fontSize:13,color:t.mid,marginBottom:12}}>Downloading map tiles…</div>
          <div style={{background:t.soft,borderRadius:8,height:8,overflow:'hidden',marginBottom:8}}>
            <div style={{height:'100%',borderRadius:8,background:t.f700,width:`${Math.round(dlProgress.done/dlProgress.total*100)}%`,transition:'width 0.3s ease'}}/>
          </div>
          <div style={{fontSize:12,color:t.mid,textAlign:'center'}}>{dlProgress.done.toLocaleString()} / {dlProgress.total.toLocaleString()} tiles</div>
        </>}
        {dlState==='done'&&<>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,padding:'10px 12px',background:t.sage50,borderRadius:10,border:`1px solid ${t.sage700}22`}}>
            {Ico.check(t.sage700,16)}
            <div>
              <div style={{fontSize:13,fontWeight:600,color:t.sage700}}>Map saved for offline use</div>
              {offMeta?.savedAt&&<div style={{fontSize:11,color:t.mid,marginTop:2}}>Saved {offMeta.savedAt}</div>}
            </div>
          </div>
          <button onClick={removeDownload} style={{width:'100%',height:38,borderRadius:19,background:t.rose50,color:t.rose700,fontSize:13,fontWeight:600,border:`1px solid ${t.rose700}33`,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            {Ico.trash(t.rose700,14)} Remove offline maps

        </>}
      </Card>

      <Card padding={14} style={{width:'100%',maxWidth:300}}>
        <div style={{fontSize:12,color:t.mid,fontFamily:'monospace',textAlign:'center',marginBottom:10}}>{longPressMenu.lat.toFixed(5)}, {longPressMenu.lng.toFixed(5)}</div>
