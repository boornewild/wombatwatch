              <form onSubmit={submit}>
                <input style={inp} placeholder="Email address" type="email" value={email} onChange={e=>setEmail(e.target.value)} autoComplete="email" autoCapitalize="none" autoFocus={isWall}/>
                <input style={inp} placeholder="Password" type="password" value={pw} onChange={e=>setPw(e.target.value)} autoComplete="current-password"/>
                {err&&<div style={{color:t.rose700,fontSize:13,marginBottom:10,padding:'9px 12px',background:t.rose50,borderRadius:8,lineHeight:1.4}}>{err}</div>}
                <button type="submit" disabled={loading||!email||!pw} style={{width:'100%',background:(loading||!email||!pw)?t.faint:t.f700,color:'#fff',borderRadius:14,padding:'14px 0',fontSize:16,fontWeight:700,marginTop:4,opacity:loading?0.7:1,transition:'background 0.2s'}}>
                  {loading?'Please wait…':'Sign In'}
                </button>
              </form>
              <div style={{marginTop:14,textAlign:'center'}}>
                <button onClick={()=>{setForgotMode(true);setErr('');}} style={{color:t.f700,fontSize:13,fontWeight:600}}>
                  Forgot password?
                </button>
              </div>
              <div style={{marginTop:10,textAlign:'center',fontSize:13,color:t.mid,lineHeight:1.5}}>
                Need access? Contact your WombatWatch coordinator<br/>to have an account set up for you.
              </div>
            </>
        }
        {!isWall&&onClose&&<button onClick={onClose} style={{marginTop:14,width:'100%',textAlign:'center',color:t.mid,fontSize:14,padding:'8px 0'}}>
          Cancel
        </button>}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   APP
════════════════════════════════════════════════════════════════ */
function App(){
  const init=load();
  const [data,dispatch]=React.useReducer(reducer,{
    wombats:init.wombats,burrows:init.burrows,treatments:init.treatments,
    sightings:init.sightings||[],burrowLogs:init.burrowLogs||[],wombatPhotos:init.wombatPhotos||[],burrowPhotos:init.burrowPhotos||[],
  });
  // ── Photo IDB hydration (runs once on mount) ─────────────────
  // 1. Migrates any existing base64 dataUrls still in localStorage → IDB
  // 2. Merges IDB photo data back into React state
  React.useEffect(()=>{
    async function hydratePhotos(){
      try{
        // Migrate: pull any base64 still sitting in localStorage into IDB
        const wpRaw=JSON.parse(localStorage.getItem(SK.wp)||'[]');
        const bpRaw=JSON.parse(localStorage.getItem(SK.bp)||'[]');
        let migrated=false;
        for(const p of [...wpRaw,...bpRaw]){
          if(p.dataUrl?.startsWith('data:')){
            await idbPutPhoto(p.id,p.dataUrl);
            migrated=true;
          }
        }
        if(migrated){
          // Re-save without base64 so localStorage is freed up
          localStorage.setItem(SK.wp,JSON.stringify(wpRaw.map(noB64)));
          localStorage.setItem(SK.bp,JSON.stringify(bpRaw.map(noB64)));
        }
        // Load all IDB photo data and merge into state
        const map=await idbGetAllPhotos();
        if(Object.keys(map).length>0) dispatch({type:'HYDRATE_PHOTO_DATA',map});
      }catch(e){console.warn('[IDB] hydration failed',e);}
    }
    hydratePhotos();
  },[]);

  const [screen,setScreen]=useState('dashboard');
  const [selectedId,setSelectedId]=useState(null);
  const [theme,setTheme]=useState(init.theme);
  const [modal,setModal]=useState(null);
  const [online,setOnline]=useState(navigator.onLine);
  // Map filter state lifted here so it survives tab switches (resets on page reload)
  const [mapWombatFilters,setMapWombatFilters]=useState(new Set());
  const [mapBurrowFilters,setMapBurrowFilters]=useState(new Set());
  const [mapCameraFilter,setMapCameraFilter]=useState(false);
  // Wombat list filter/sort state — survives tab switches, resets on page reload
  const [wombatFilterStatus,setWombatFilterStatus]=useState('active');
  const [wombatSortBy,setWombatSortBy]=useState('date_added');
  // Burrow list filter/sort state — survives tab switches, resets on page reload
  const [burrowFilterStatus,setBurrowFilterStatus]=useState('all');
  const [burrowSortBy,setBurrowSortBy]=useState('date_added');
  const [queueLen,setQueueLen]=useState(()=>{try{return JSON.parse(localStorage.getItem(SQ_KEY)||'[]').length;}catch{return 0;}});
  const refreshQueue=()=>{try{setQueueLen(JSON.parse(localStorage.getItem(SQ_KEY)||'[]').length);}catch{}};
  const t=theme==='dark'?T.D:T.L;

  // ── Auth ─────────────────────────────────────────────────────
  // Cache helpers must be defined before the useState calls that reference them
  const AUTH_CACHE='ww_auth_cache';
  const cacheUser=u=>{try{localStorage.setItem(AUTH_CACHE,JSON.stringify({id:u.id,email:u.email,user_metadata:u.user_metadata||{}}));}catch{}};
  const clearUserCache=()=>{try{localStorage.removeItem(AUTH_CACHE);}catch{}};
  const getCachedUser=()=>{try{return JSON.parse(localStorage.getItem(AUTH_CACHE)||'null');}catch{return null;}};

  // Profile cache — mirrors AUTH_CACHE but for the profiles row (role, display_name, etc.)
  // Persisted so delete buttons and admin controls stay visible when the app is offline.
  const PROFILE_CACHE='ww_profile_cache';
  const cacheProfile=p=>{try{localStorage.setItem(PROFILE_CACHE,JSON.stringify(p));}catch{}};
  const clearProfileCache=()=>{try{localStorage.removeItem(PROFILE_CACHE);}catch{}};
  const getCachedProfile=()=>{try{return JSON.parse(localStorage.getItem(PROFILE_CACHE)||'null');}catch{return null;}};

  const [authUser,setAuthUser]=useState(null);
  const [authProfile,setAuthProfile]=useState(()=>getCachedProfile());
  const [syncing,setSyncing]=useState(false);
  const [authChecked,setAuthChecked]=useState(false);
  const [resetMode,setResetMode]=useState(false); // true while handling a password-reset link
  const explicitSignOut=React.useRef(false);
  const signedIn=!!authUser;

  // Wire the global auth-error hook so supaUpsert/supaDelete can force a sign-out
  // when they receive a 401 (e.g. account revoked while the volunteer was in the field).
  // We show the login screen rather than silently failing writes.
  useEffect(()=>{
    onAuthError=()=>{
      console.warn('[Auth] 401 received — clearing session');
      clearUserCache();
      clearProfileCache();
      setAuthUser(null);
      setAuthProfile(null);
      setAuthChecked(true);
    };
    return()=>{onAuthError=null;};
  },[]);

  useEffect(()=>{
    // Restore any existing session on page reload.
    // If offline and token expired, fall back to our own localStorage cache
    // so volunteers aren't stuck at the login screen in the field.
    const resolveAuth=(session)=>{
      if(session?.user){
        setAuthUser(session.user);
        cacheUser(session.user);
      }else{
        const cached=getCachedUser();
        if(cached)setAuthUser(cached);
      }
      setAuthChecked(true);
    };
    // Safety net: if Supabase hangs (network issue, CDN slow, etc.)
    // show the login screen after 9 seconds rather than a blank screen forever.
    // 9 s gives enough runway for a slow bush-connection to resolve.
    const fallback=setTimeout(()=>resolveAuth(null),9000);
    supa.auth.getSession()
      .then(({data:{session}})=>{clearTimeout(fallback);resolveAuth(session);})
      .catch(()=>{clearTimeout(fallback);resolveAuth(null);});
    // Live auth state changes (sign-in, sign-out, token refresh)
    const{data:{subscription}}=supa.auth.onAuthStateChange(async(event,session)=>{
      // Password-reset link clicked — show the set-new-password screen.
      // Supabase has already set the session so we know who the user is.
      if(event==='PASSWORD_RECOVERY'){
        setAuthUser(session?.user||null);
        setResetMode(true);
        setAuthChecked(true);
        return;
      }
      // Only honour SIGNED_OUT if the volunteer explicitly tapped Sign Out.
      // Any automatic sign-out (token expiry, network blip, etc.) is ignored.
      if(event==='SIGNED_OUT'){
        if(!explicitSignOut.current)return;
        explicitSignOut.current=false;
      }
      const user=session?.user||null;
      setAuthUser(user);
      if(user){
        cacheUser(user);
        // Load role / display name from profiles table.
        // On success the fresh row is cached so it's available next time offline.
        // On failure (offline / RLS error) we fall back to the cached profile so
        // admin controls (delete buttons etc.) remain visible in the field.
        supa.from('profiles').select('*').eq('id',user.id).single()
          .then(({data:p,error})=>{
            if(p&&!error){cacheProfile(p);setAuthProfile(p);}
            else{const c=getCachedProfile();if(c)setAuthProfile(c);}
          })
          .catch(()=>{const c=getCachedProfile();if(c)setAuthProfile(c);});
        // Show the sync bar briefly, then hide it — sync continues in background
        setSyncing(true);
        setTimeout(()=>setSyncing(false),2000);
        supaFullSync().then(merged=>{
          if(merged){
            // Detect and fix any duplicate W/B codes caused by offline users
            // independently auto-assigning the same number. Earliest record keeps
            // its code; later duplicates are silently renumbered upward.
            const fresh=resolveWithCurrentQueue(merged);
            const{records:wombats,changed:changedW}=deduplicateCodes(fresh.wombats,'W');
            const{records:burrows,changed:changedB}=deduplicateCodes(fresh.burrows,'B');
            const synced={...fresh,wombats,burrows};
            dispatch({type:'REPLACE_ALL',data:synced});
            // Re-hydrate IDB photo data after the sync wipes dataUrls from state
            idbGetAllPhotos().then(map=>{if(Object.keys(map).length)dispatch({type:'HYDRATE_PHOTO_DATA',map});}).catch(()=>{});
            // Patch renumbered records back to Supabase so everyone stays consistent
            changedW.forEach(w=>supa.from('wombats').update({code:w.code}).eq('id',w.id).then(null,()=>{}));
            changedB.forEach(b=>supa.from('burrows').update({code:b.code}).eq('id',b.id).then(null,()=>{}));
            // Silently fill in any missing suburb names for records created offline
            geocodeBackfill(synced,dispatch);
          }else if(merged===null){
            // confirmed new user — no data on the server yet, clear any seed data
            dispatch({type:'REPLACE_ALL',data:{wombats:[],burrows:[],treatments:[],sightings:[],burrowLogs:[],wombatPhotos:[],burrowPhotos:[]}});
          }
          // merged===undefined means all queries failed (offline) — local state untouched
          flushQueue(user.id).catch(()=>{});
        }).catch(e=>console.warn('[Supa] full sync error',e));
      }else{
        clearUserCache();
        setAuthProfile(null);
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  // ── Online/offline + queue flush ─────────────────────────────
  useEffect(()=>{
    const on=async()=>{
      setOnline(true);
      if(!authUser)return;
      // Pull the latest server state before flushing so that:
      //  (a) any data added on other devices appears immediately, and
      //  (b) offline-added photo metadata is in state before flushQueue
      //      tries to upload the corresponding blobs.
      try{
        const merged=await supaFullSync();
        if(merged){
          const fresh=resolveWithCurrentQueue(merged);
          const{records:wombats,changed:changedW}=deduplicateCodes(fresh.wombats,'W');
          const{records:burrows,changed:changedB}=deduplicateCodes(fresh.burrows,'B');
          const synced={...fresh,wombats,burrows};
          dispatch({type:'REPLACE_ALL',data:synced});
          idbGetAllPhotos().then(map=>{if(Object.keys(map).length)dispatch({type:'HYDRATE_PHOTO_DATA',map});}).catch(()=>{});
          changedW.forEach(w=>supa.from('wombats').update({code:w.code}).eq('id',w.id).then(null,()=>{}));
          changedB.forEach(b=>supa.from('burrows').update({code:b.code}).eq('id',b.id).then(null,()=>{}));
          geocodeBackfill(synced,dispatch);
        }
      }catch(e){console.warn('[Sync] reconnect sync failed',e);}
      // After flushing, do a second full sync so records created by other volunteers
      // while we were offline appear immediately. The queue is empty at this point so
      // whatever the server returns is authoritative.
      flushQueue(authUser.id).catch(()=>{}).finally(()=>{
        refreshQueue();
        supaFullSync().then(merged=>{
          if(merged){
            const fresh=resolveWithCurrentQueue(merged);
            const{records:wombats,changed:changedW}=deduplicateCodes(fresh.wombats,'W');
            const{records:burrows,changed:changedB}=deduplicateCodes(fresh.burrows,'B');
            const synced={...fresh,wombats,burrows};
            dispatch({type:'REPLACE_ALL',data:synced});
            idbGetAllPhotos().then(map=>{if(Object.keys(map).length)dispatch({type:'HYDRATE_PHOTO_DATA',map});}).catch(()=>{});
            changedW.forEach(w=>supa.from('wombats').update({code:w.code}).eq('id',w.id).then(null,()=>{}));
            changedB.forEach(b=>supa.from('burrows').update({code:b.code}).eq('id',b.id).then(null,()=>{}));
            geocodeBackfill(synced,dispatch);
          }
        }).catch(e=>console.warn('[Sync] post-flush re-sync failed',e));
      });
    };
    const off=()=>setOnline(false);
    window.addEventListener('online',on);window.addEventListener('offline',off);
    // Periodic queue drain: catches the case where navigator.onLine stayed true
    // throughout (weak cell/WiFi with no real internet) so the 'online' event
    // never fired, leaving queued entries stranded until the next app reload.
    const drainInterval=setInterval(()=>{
      if(navigator.onLine&&authUser){
        try{
          const q=JSON.parse(localStorage.getItem(SQ_KEY)||'[]');
          if(q.length)flushQueue(authUser.id).catch(()=>{}).finally(refreshQueue);
        }catch(e){}
      }
    },30000); // every 30 seconds
    return()=>{
      window.removeEventListener('online',on);
      window.removeEventListener('offline',off);
      clearInterval(drainInterval);
    };
  },[authUser]);

  // ── Tab visibility re-sync ────────────────────────────────────
  // When the user switches back to this tab (e.g. after editing on their phone),
  // pull the latest from Supabase so changes made on other devices appear immediately.
  // Only fires if the tab was hidden for at least 30 seconds to avoid thrashing on
  // quick alt-tabs. No spinner — runs silently in the background.
  useEffect(()=>{
    let hiddenAt=null;
    const onVisibility=()=>{
      if(document.visibilityState==='hidden'){
        hiddenAt=Date.now();
      }else if(document.visibilityState==='visible'){
        const hiddenMs=hiddenAt?Date.now()-hiddenAt:Infinity;
        hiddenAt=null;
        if(hiddenMs<30000)return; // too brief — skip
        if(!authUser||!navigator.onLine)return;
        supaFullSync().then(merged=>{
          if(merged){
            const fresh=resolveWithCurrentQueue(merged);
            const{records:wombats}=deduplicateCodes(fresh.wombats,'W');
            const{records:burrows}=deduplicateCodes(fresh.burrows,'B');
            dispatch({type:'REPLACE_ALL',data:{...fresh,wombats,burrows}});
            idbGetAllPhotos().then(map=>{if(Object.keys(map).length)dispatch({type:'HYDRATE_PHOTO_DATA',map});}).catch(()=>{});
          }
        }).catch(()=>{});
      }
    };
    document.addEventListener('visibilitychange',onVisibility);
    return()=>document.removeEventListener('visibilitychange',onVisibility);
  },[authUser]);

  // ── Background Sync message from service worker ───────────────
  // On Android/Chrome the SW fires a 'sync' event once connectivity is confirmed
  // stable (more reliable than the 'online' event). The SW messages the open tab
  // which then flushes the queue. iOS doesn't support BackgroundSync — no-op there.
  useEffect(()=>{
    if(!navigator.serviceWorker)return;
    const handler=e=>{
      if(e.data?.type==='WW_FLUSH_QUEUE'&&authUser){
        flushQueue(authUser.id).catch(()=>{}).finally(refreshQueue);
      }
    };
    navigator.serviceWorker.addEventListener('message',handler);
    return()=>navigator.serviceWorker.removeEventListener('message',handler);
  },[authUser]);

  // ── Sync-aware dispatch ───────────────────────────────────────
  // Calls the reducer synchronously then pushes the action to Supabase.
  // Offline writes are queued in localStorage and flushed on reconnect.
  // ── Streak ───────────────────────────────────────────────────
  const [streak,setStreak]=useState(()=>loadStreak().count);
  const [recoveredWombat,setRecoveredWombat]=useState(null); // {name} when celebration shows

  const ACTIVITY_ACTIONS=new Set(['ADD_TREATMENT','ADD_SIGHTING','ADD_BURROW_LOG','ADD_WOMBAT','ADD_BURROW']);

  const syncDispatch=action=>{
    // Recovery celebration: catch a wombat being marked healthy from a treated state
    if(action.type==='UPDATE_WOMBAT'&&action.patch?.status==='healthy'){
      const prev=data.wombats.find(w=>w.id===action.id);
      if(prev&&prev.status==='under_treatment'){
        const profilePhoto=(data.wombatPhotos||[]).find(p=>p.wombatId===prev.id&&p.isProfile);
        setRecoveredWombat({name:prev.name,photoUrl:profilePhoto?.dataUrl||null});
      }
    }
    // Streak: touch on any logging activity
    if(ACTIVITY_ACTIONS.has(action.type)){
      const newCount=touchStreak();
      setStreak(newCount);
    }
    // IDB: persist base64 photo data outside localStorage
    if((action.type==='ADD_WOMBAT_PHOTO'||action.type==='ADD_BURROW_PHOTO')&&action.photo?.dataUrl?.startsWith('data:')){
      const _pid=action.photo.id, _pdata=action.photo.dataUrl;
      const _plsKey=action.type==='ADD_WOMBAT_PHOTO'?SK.wp:SK.bp;
      idbPutPhoto(_pid,_pdata).catch(()=>{
        // IDB write failed — restore base64 to localStorage so the photo survives a reload.
        // On next startup the migration will re-attempt the IDB write automatically.
        try{
          const list=JSON.parse(localStorage.getItem(_plsKey)||'[]');
          const patched=list.map(p=>p.id===_pid?{...p,dataUrl:_pdata}:p);
          localStorage.setItem(_plsKey,JSON.stringify(patched));
        }catch(e2){console.warn('[IDB fallback] localStorage also failed',e2);}
      });
    }
    if(action.type==='DELETE_WOMBAT_PHOTO'&&action.photoId) idbDeletePhoto(action.photoId).catch(()=>{});
    if(action.type==='DELETE_BURROW_PHOTO'&&action.photoId) idbDeletePhoto(action.photoId).catch(()=>{});
    dispatch(action);
    if(authUser)syncAction(action,authUser.id).catch(e=>console.warn('[Supa]',e)).finally(refreshQueue);
    else refreshQueue();
  };

  const nav=(s,id=null)=>{setScreen(s);setSelectedId(id);setModal(null);};
  const toggleTheme=()=>{const nt=theme==='dark'?'light':'dark';setTheme(nt);localStorage.setItem(SK.theme,nt);};
  // Keep <html> data-theme in sync so CSS variables (including body background) work outside .app
  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);},[theme]);
  const toggleSignIn=async()=>{
    if(signedIn){
      explicitSignOut.current=true;
      clearUserCache();
      clearProfileCache();
      await supa.auth.signOut();
      setAuthUser(null);setAuthProfile(null);
    }else{
      setModal('sign-in');
    }
  };
  const openProfile=()=>setModal('profile');
  const onFAB=()=>setModal('fab');
  const [addAtLoc,setAddAtLoc]=useState(null);
  const onAddAt=(lat,lng,type)=>{setAddAtLoc({lat,lng});setModal(type==='wombat'?'add-wombat':'add-burrow');};
  const fabSelect=key=>{
    setModal(null);setAddAtLoc(null);
    if(key==='wombat')setModal('add-wombat');
    else if(key==='burrow')setModal('add-burrow');
  };

  // Show nothing while we check for an existing session (avoids flash)
  if(!authChecked)return <ThemeCtx.Provider value={t}>
    <div data-theme={theme} className="app" style={{background:t.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div style={{fontSize:11,letterSpacing:1.6,textTransform:'uppercase',color:t.f700,fontWeight:600}}>WombatWatch</div>
      <div style={{width:36,height:36,border:`3px solid ${t.sage50}`,borderTopColor:t.f700,borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
    </div>
  </ThemeCtx.Provider>;
  // Password reset flow — user clicked the email link; let them set a new password
  if(resetMode)return <ThemeCtx.Provider value={t}><div data-theme={theme} className="app" style={{background:t.bg}}><SetPasswordModal onDone={()=>setResetMode(false)}/></div></ThemeCtx.Provider>;
  // Gate: show only the login wall until signed in
  if(!authUser)return <ThemeCtx.Provider value={t}><div data-theme={theme} className="app" style={{background:t.bg}}><SignInModal/></div></ThemeCtx.Provider>;

  return <ThemeCtx.Provider value={t}>
    <div data-theme={theme} className="app">
      {/* Supabase sync progress bar */}
      {syncing&&<div style={{position:'fixed',top:0,left:'max(0px,calc(50vw - 240px))',right:'max(0px,calc(50vw - 240px))',height:3,zIndex:9999,background:t.f700,transformOrigin:'left',animation:'syncBar 1.4s ease-in-out infinite'}}/>}
      {/* ── content area: grows to fill space above the tab bar ── */}
      <div className="content-area">
        {screen==='dashboard'&&<div className="scroll noscroll"><Dashboard data={data} nav={nav} onFAB={onFAB} online={online} pending={queueLen>0} openProfile={openProfile} streak={streak}/></div>}
        {screen==='activity'&&<div className="scroll noscroll"><ActivityScreen data={data} nav={nav}/></div>}
        {screen==='map'&&<MapScreen data={data} nav={nav} onFAB={onFAB} openProfile={openProfile} theme={theme} onAddAt={onAddAt} wombatFilters={mapWombatFilters} setWombatFilters={setMapWombatFilters} burrowFilters={mapBurrowFilters} setBurrowFilters={setMapBurrowFilters} cameraFilter={mapCameraFilter} setCameraFilter={setMapCameraFilter}/>}
        {screen==='wombats'&&<div className="scroll noscroll"><WombatList data={data} nav={nav} onFAB={onFAB} openProfile={openProfile} dispatch={syncDispatch} authUser={authUser} authProfile={authProfile} filterStatus={wombatFilterStatus} setFilterStatus={setWombatFilterStatus} sortBy={wombatSortBy} setSortBy={setWombatSortBy}/></div>}
        {screen==='wombat-profile'&&<div className="scroll noscroll"><WombatProfile wombatId={selectedId} data={data} nav={nav} dispatch={syncDispatch} openProfile={openProfile} authProfile={authProfile}/></div>}
        {screen==='burrows'&&<div className="scroll noscroll"><BurrowList data={data} nav={nav} onFAB={onFAB} openProfile={openProfile} dispatch={syncDispatch} authUser={authUser} authProfile={authProfile} filterStatus={burrowFilterStatus} setFilterStatus={setBurrowFilterStatus} sortBy={burrowSortBy} setSortBy={setBurrowSortBy}/></div>}
        {screen==='burrow-profile'&&<div className="scroll noscroll"><BurrowProfile burrowId={selectedId} data={data} nav={nav} dispatch={syncDispatch} openProfile={openProfile} authProfile={authProfile}/></div>}
      </div>
      {/* ── single tab bar, pinned below content, never overlapping ── */}
      <div style={{flexShrink:0,height:'62px',background:'var(--tabbar)',borderTop:'1px solid var(--tabborder)'}}/>
      <TabBar active={screen} onNav={nav} onFAB={onFAB}/>

      {modal==='profile'&&<ProfileSheet onClose={()=>setModal(null)} onToggleTheme={toggleTheme} theme={theme} onEditProfile={()=>setModal('edit-profile')} onFAQ={()=>setModal('faq')} signedIn={signedIn} onToggleSignIn={toggleSignIn} data={data} onExport={()=>setModal('export')} onCSVImport={()=>setModal('csv-import')} authUser={authUser} authProfile={authProfile}/>}
      {modal==='edit-profile'&&<EditProfileModal onClose={()=>setModal(null)}/>}
      {modal==='faq'&&<FAQSheet onClose={()=>setModal(null)}/>}
      {modal==='export'&&authProfile?.role==='admin'&&<ExportSheet data={data} onClose={()=>setModal(null)}/>}
      {modal==='csv-import'&&authProfile?.role==='admin'&&<CSVImportModal onClose={()=>setModal(null)} onImportWombats={wombats=>{syncDispatch({type:'IMPORT_WOMBATS',wombats});nav('wombats');}} onImportBurrows={burrows=>{syncDispatch({type:'IMPORT_BURROWS',burrows});nav('burrows');}}/>}
      {modal==='fab'&&<FABSheet onClose={()=>setModal(null)} onSelect={fabSelect}/>}
      {modal==='add-wombat'&&<AddWombatModal burrows={data.burrows} initialLocation={addAtLoc} nextCode={nextWombatCode(data.wombats)} onClose={()=>{setModal(null);setAddAtLoc(null);}} onSave={(w,linkedBurrowId,photo)=>{syncDispatch({type:'ADD_WOMBAT',wombat:w});if(linkedBurrowId)syncDispatch({type:'LINK_WOMBAT_BURROW',wombatId:w.id,burrowId:linkedBurrowId});if(photo)syncDispatch({type:'ADD_WOMBAT_PHOTO',photo});setModal(null);setAddAtLoc(null);nav('wombat-profile',w.id);}}/>}
      {modal==='add-burrow'&&<AddBurrowModal initialLocation={addAtLoc} nextCode={nextBurrowCode(data.burrows)} wombats={data.wombats} onClose={()=>{setModal(null);setAddAtLoc(null);}} onSave={(b,photo)=>{syncDispatch({type:'ADD_BURROW',burrow:b});(b.wombatIds||[]).forEach(wId=>syncDispatch({type:'LINK_WOMBAT_BURROW',wombatId:wId,burrowId:b.id}));if(photo)syncDispatch({type:'ADD_BURROW_PHOTO',photo});setModal(null);setAddAtLoc(null);nav('burrow-profile',b.id);}}/>}
      {modal==='add-sighting'&&<AddSightingModal wombats={data.wombats} onClose={()=>setModal(null)} onSave={s=>{syncDispatch({type:'ADD_SIGHTING',sighting:s});setModal(null);}}/>}
      {modal==='sign-in'&&<SignInModal onClose={()=>setModal(null)}/>}
      {recoveredWombat&&<RecoveryModal name={recoveredWombat.name} photoUrl={recoveredWombat.photoUrl} onClose={()=>setRecoveredWombat(null)}/>}
    </div>
  </ThemeCtx.Provider>;
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="padding:24px;font-family:monospace;font-size:13px;color:#c00;background:#fff;position:fixed;inset:0;overflow:auto;z-index:99999"><h2 style="margin:0 0 12px">⚠️ WombatWatch render error</h2><pre style="white-space:pre-wrap">' + (e && e.stack ? e.stack : String(e)) + '</pre></div>';
}
</script>

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(err => console.warn('Service worker registration failed:', err));

</script>
